<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <title>SSP JSON 元件對應圖檢視器</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Microsoft JhengHei", "Noto Sans TC", Arial, sans-serif;
      background: #f4f6f8;
      color: #1f2937;
    }

    .app-header {
      padding: 18px 24px;
      background: #ffffff;
      border-bottom: 1px solid #d7dde5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file-picker,
    .json-picker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 280px;
    }

    .file-picker input,
    .json-picker select {
      width: 100%;
      max-width: 420px;
      padding: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
    }

    .json-picker.hidden {
      display: none;
    }

    .hint-text {
      color: #64748b;
      font-size: 12px;
      white-space: nowrap;
    }

    .summary {
      padding: 14px 24px;
      color: #475569;
      border-bottom: 1px solid #d7dde5;
      background: #eef3f8;
      font-size: 14px;
    }


    .top-toggle-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 6px 24px;
      background: #0f172a;
      color: #e2e8f0;
      border-bottom: 1px solid #1e293b;
      font-size: 13px;
    }

    .top-toggle-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .top-toggle-button {
      flex: 0 0 auto;
      padding: 5px 10px;
      border: 1px solid #475569;
      border-radius: 6px;
      background: #1e293b;
      color: #f8fafc;
      cursor: pointer;
      font-size: 13px;
    }

    .top-toggle-button:hover {
      background: #334155;
    }

    body.top-collapsed .app-header,
    body.top-collapsed .summary {
      display: none;
    }

    body.top-collapsed .content.compare-content {
      height: calc(100vh - 44px);
    }

    .content {
      padding: 18px 24px 28px;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid #d7dde5;
      border-radius: 8px;
      background: #ffffff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #e2e8f0;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #eaf1fb;
      color: #1e3a5f;
      white-space: nowrap;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .image-column {
      width: 54px;
      text-align: center;
    }

    .image-button {
      width: 32px;
      height: 32px;
      border: 1px solid #bfdbfe;
      border-radius: 6px;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 700;
      cursor: pointer;
    }

    .image-button:hover {
      background: #dbeafe;
      border-color: #60a5fa;
    }

    .image-button:disabled {
      color: #94a3b8;
      background: #f1f5f9;
      border-color: #cbd5e1;
      cursor: not-allowed;
    }

    .empty-state {
      padding: 36px 20px;
      color: #64748b;
      text-align: center;
      background: #ffffff;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
    }

    .error {
      color: #b91c1c;
      font-weight: 700;
    }

    .image-dialog {
      width: min(92vw, 980px);
      max-height: 90vh;
      padding: 0;
      border: 0;
      border-radius: 8px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .34);
    }

    .image-dialog::backdrop {
      background: rgba(15, 23, 42, .58);
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid #d7dde5;
      background: #545a67;
    }

    .dialog-title {
      min-width: 0;
      margin: 0;
      color: #1e293b;
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    .dialog-close {
      width: 34px;
      height: 34px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #ffffff;
      color: #334155;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }

    .dialog-body {
      min-height: 220px;
      max-height: calc(90vh - 60px);
      padding: 16px;
      overflow: auto;
      background: #ffffff;
      text-align: center;
    }

    .dialog-body img {
      max-width: 100%;
      height: auto;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      background: #ffffff;
    }

    .document-dialog {
      width: min(98vw, 1680px);
      max-height: 94vh;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: #08101d;
      box-shadow: 0 24px 80px rgba(15, 23, 42, .38);
    }

    .document-dialog::backdrop {
      background: rgba(15, 23, 42, .62);
    }

    .document-dialog .dialog-header {
      border-bottom-color: rgba(148, 180, 220, .18);
      background: #46556d;
    }

    .document-dialog .dialog-title {
      color: #eff7ff;
    }

    .document-dialog .dialog-close {
      border-color: rgba(255, 255, 255, .14);
      background: rgba(255, 255, 255, .06);
      color: #dbe8fb;
    }

    .document-dialog-body {
      max-height: calc(94vh - 60px);
      padding: 18px;
      overflow: auto;
      background: #484848;
      color: #dbe8fb;
      text-align: left;
    }

    .document-compare-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 16px;
      min-height: min(760px, calc(94vh - 96px));
    }

    .document-compare-panel {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      border: 1px solid rgba(148, 180, 220, .22);
      border-radius: 8px;
      background: rgba(8, 16, 29, .34);
      overflow: hidden;
    }

    .document-compare-heading {
      margin: 0;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(148, 180, 220, .20);
      background: rgba(70, 85, 109, .72);
      color: #eff7ff;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .document-compare-content {
      flex: 1 1 auto;
      min-height: 0;
      padding: 16px;
      overflow: auto;
    }

    .original-document-panel .document-compare-content {
      padding: 0;
      background: #ffffff;
    }

    .original-document-view {
      min-height: 100%;
      padding: 10px 8px 28px;
      background: #ffffff;
      color: #111827;
      font-family: "Microsoft JhengHei", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.65;
    }

    .original-document-title {
      margin: 0 0 14px;
      color: #111827;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
    }

    .original-document-section-title {
      margin: 18px 0 34px;
      color: #111827;
      font-size: 15px;
      font-weight: 700;
    }

    .original-document-core-title {
      margin: 0 0 16px;
      color: #111827;
      font-size: 15px;
      font-weight: 700;
    }

    .original-process {
      margin: 0 0 24px;
    }

    .original-process-title {
      margin: 0 0 10px;
      color: #111827;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .original-step-row {
      display: grid;
      grid-template-columns: minmax(180px, 48%) minmax(180px, 1fr);
      gap: 18px;
      align-items: start;
      margin: 12px 0;
    }

    .original-step-row+.original-step-row {
      margin-top: 14px;
    }

    .original-step-row-no-graphic {
      grid-template-columns: minmax(0, 1fr);
    }

    .original-step-graphics,
    .original-step-text {
      min-width: 0;
    }

    .original-step-text ul {
      margin: 0;
      padding-left: 20px;
    }

    .original-step-text li {
      margin: 0 0 10px;
      color: #111827;
      font-size: 14px;
      line-height: 1.65;
    }

    .original-step-text p {
      margin: 0;
    }

    .original-document-view .hotspot,
    .original-image-number {
      color: #2563eb;
      text-decoration: underline;
      font-weight: 600;
    }

    .original-document-view .xml-use-image-wrap {
      margin: 0 0 12px;
      padding: 0;
      border: 1px solid #5f6368;
      border-radius: 0;
      background: #ffffff;
    }

    .original-document-view .xml-use-image-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 6px;
      background: #ffffff;
    }

    .original-document-view .placeholder {
      margin: 0 0 12px;
      color: #6b7280;
      font-size: 14px;
    }

    .original-more-info {
      margin: 0 0 16px;
      font-size: 14px;
      line-height: 1.65;
    }

    .original-more-info a,
    .original-hint-links a {
      color: #1d4ed8;
      text-decoration: underline;
      font-weight: 700;
    }

    .original-repair-hints {
      margin: 0 0 20px;
    }

    .original-hint-box {
      margin: 16px 0;
      border: 1px solid transparent;
      color: #111827;
      font-size: 14px;
      line-height: 1.65;
    }

    .original-hint-box.warning {
      border-color: #ff8a1c;
      background: #ffe0bd;
    }

    .original-hint-box.damage {
      border-color: #1a8fcb;
      background: #9ee3ff;
    }
    .original-hint-box.info {
      border-color: #3b82f6;
      background: #dbeafe;
    }

    .original-hint-box.info .original-hint-header {
      background: #2563eb;
      color: #ffffff;
    }

    .original-hint-header {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 26px;
      padding: 3px 12px;
      color: #ffffff;
      font-weight: 700;
    }

    .original-hint-box.warning .original-hint-header {
      background: #ff8617;
      color: #111827;
    }

    .original-hint-box.damage .original-hint-header {
      background: #0b75b4;
      color: #ffffff;
    }

    .original-hint-icon {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      line-height: 1;
    }

    .original-hint-body {
      margin: 0 10px 12px;
      padding: 12px 14px;
      background: #ffffff;
    }

    .original-hint-box.warning .original-hint-body {
      background: #ffffff;
    }

    .original-hint-box.damage .original-hint-body {
      background: #ffffff;
    }

    .original-hint-main {
      margin: 0 0 8px;
      font-weight: 700;
    }

    .original-hint-detail {
      margin: 0 0 8px;
      font-weight: 700;
    }

    .original-hint-list {
      margin: 6px 0 0 18px;
      padding: 0;
    }

    .original-hint-list li {
      margin: 0 0 2px;
      padding-left: 2px;
    }

    .original-hint-links {
      display: grid;
      gap: 8px;
      margin: 12px 0 0 18px;
    }
    .original-generic-block {
      margin: 8px 0;
    }

    .original-generic-block p {
      margin: 0 0 6px;
    }

    .original-generic-title {
      margin: 10px 0 6px;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
    }

    .original-document-links {
      display: grid;
      gap: 6px;
      margin: 8px 0 10px 18px;
    }

    .original-document-link {
      color: #1d4ed8;
      text-decoration: underline;
      font-weight: 700;
      line-height: 1.5;
      word-break: break-word;
    }

    .original-functional-view {
      min-height: 100%;
      padding: 22px 16px 32px;
      background: #ffffff;
      color: #111827;
      font-family: "Microsoft JhengHei", "Microsoft YaHei", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.65;
    }

    .original-functional-title {
      margin: 0 0 10px;
      color: #111827;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.4;
    }

    .original-functional-section-title {
      margin: 14px 0 8px;
      color: #111827;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
    }

    .original-functional-view p {
      margin: 0 0 2px;
      color: #111827;
      font-size: 14px;
      line-height: 1.65;
    }

    .original-functional-view strong {
      font-weight: 700;
    }

    .original-functional-figure {
      margin: 28px 0 22px;
    }

    .original-functional-figure .xml-use-image-wrap {
      margin: 0;
      padding: 0;
      border: 2px solid #a8aeb8;
      border-radius: 0;
      background: #ffffff;
    }

    .original-functional-figure .xml-use-image-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 6px;
      background: #ffffff;
    }

    .original-functional-view table {
      width: 100%;
      margin: 10px 0 28px;
      border-collapse: collapse;
      table-layout: fixed;
      color: #111827;
      font-size: 13px;
      line-height: 1.45;
    }

    .original-functional-view th,
    .original-functional-view td {
      padding: 6px 8px;
      border: 1px solid #8f8f8f;
      background: #ffffff;
      color: #111827;
      text-align: left;
      vertical-align: top;
    }

    .original-functional-view th {
      font-weight: 700;
    }

    .original-functional-view th p,
    .original-functional-view td p {
      margin: 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .original-functional-view .placeholder {
      margin: 12px 0 24px;
      color: #6b7280;
      font-size: 14px;
    }

    @media (max-width: 960px) {
      .document-dialog {
        width: min(98vw, 760px);
      }

      .document-dialog-body {
        overflow: auto;
      }

      .document-compare-layout {
        grid-template-columns: minmax(0, 1fr);
        min-height: 0;
      }

      .document-compare-content {
        max-height: 62vh;
      }

      .original-step-row {
        grid-template-columns: minmax(0, 1fr);
      }
    }

    .document-page-subtitle {
      margin: 0 0 20px;
      color: #8fa7c6;
      font-size: 13px;
      line-height: 1.6;
    }

    .document-dialog-body .html-view {
      color: #dbe8fb;
      font-size: 14px;
      line-height: 1.65;
    }

    .document-dialog-body .html-view h2 {
      margin: 14px 0 8px;
      color: #eff7ff;
      font-size: 15px;
    }

    .document-dialog-body .html-view p {
      margin: 4px 0;
    }

    .document-dialog-body .html-view ul {
      margin: 6px 0 6px 20px;
      padding: 0;
    }

    .document-dialog-body .html-view li {
      margin: 3px 0;
    }

    .document-dialog-body .html-view table {
      width: 100%;
      margin: 10px 0;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 13px;
    }

    .document-dialog-body .html-view th,
    .document-dialog-body .html-view td {
      padding: 8px 10px;
      border: 1px solid rgba(255, 255, 255, .14);
      vertical-align: top;
    }

    .document-dialog-body .html-view th {
      background: rgba(73, 166, 255, .16);
      color: #ecf6ff;
    }

    .document-dialog-body .placeholder {
      margin: 8px 0;
      padding: 16px;
      border: 1px dashed rgba(255, 255, 255, .18);
      border-radius: 14px;
      background: rgba(255, 255, 255, .04);
      color: #8fa7c6;
      font-style: italic;
    }

    .xml-use-image-wrap {
      margin: 10px 0;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 8px;
      background: rgba(255, 255, 255, .035);
    }

    .xml-use-image-wrap img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 6px;
      background: #ffffff;
    }

    .xml-use-image-caption {
      margin-top: 8px;
      color: #8fa7c6;
      font-size: 12px;
      line-height: 1.5;
      word-break: break-word;
    }

    .document-dialog-body .doc-title {
      margin: 0 0 14px;
      padding: 10px 16px;
      border-radius: 6px;
      background: linear-gradient(to bottom, #3a8ee8, #1a6dcc);
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .5px;
    }

    .document-dialog-body #inner-content {
      padding: 0 2px 8px;
    }

    .document-dialog-body section.intro,
    .document-dialog-body section.chapter,
    .document-dialog-body section.subsection {
      margin: 0;
      padding: 0;
    }

    .document-dialog-body .repair-doc {
      padding-bottom: 8px;
    }

    .document-dialog-body .repair-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin: 10px 0 12px;
      color: #b8d7ff;
      font-size: 13px;
    }

    .document-dialog-body .repair-meta span {
      padding: 2px 10px;
      border: 1px solid rgba(148, 180, 220, .28);
      border-radius: 999px;
      background: rgba(73, 166, 255, .12);
    }

    .document-dialog-body .repair-process {
      margin-top: 14px;
    }

    .document-dialog-body .repair-step {
      padding: 14px 0;
      border-top: 1px solid rgba(148, 180, 220, .22);
    }

    .document-dialog-body .repair-step:first-child {
      padding-top: 0;
      border-top: 0;
    }

    .document-dialog-body .repair-step-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: #dbeafe;
      font-weight: 700;
    }

    .document-dialog-body .repair-step-index {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 28px;
      height: 28px;
      padding: 0 8px;
      border-radius: 999px;
      background: #1e6dc0;
      color: #ffffff;
      font-size: 13px;
    }

    .document-dialog-body .repair-hint {
      margin: 8px 0;
      padding: 10px 12px;
      border-left: 4px solid #49a6ff;
      border-radius: 4px;
      background: rgba(73, 166, 255, .10);
    }

    .document-dialog-body .repair-hint.attention {
      border-left-color: #f59e0b;
      background: rgba(245, 158, 11, .12);
    }

    .document-dialog-body .repair-hint-title {
      margin: 0 0 4px;
      color: #eff7ff;
      font-weight: 700;
    }

    .document-dialog-body .repair-inline-icon-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0 6px;
    }

    .document-dialog-body .repair-inline-icon-row .xml-use-image-wrap {
      flex: 0 0 auto;
      width: 30px;
      margin: 0;
      padding: 3px;
      border: 1px solid rgba(255, 255, 255, .14);
      border-radius: 4px;
      background: #ffffff;
    }

    .document-dialog-body .repair-inline-icon-row .xml-use-image-wrap img {
      width: 100%;
      max-width: 100%;
      height: auto;
      border: 0;
      border-radius: 0;
    }

    .document-dialog-body .repair-inline-icon-text {
      flex: 1 1 auto;
      min-width: 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .document-dialog-body .repair-inline-icon-text p {
      margin: 0;
    }

    .document-dialog-body .repair-tech-info-block {
      margin: 8px 0;
      padding: 10px 12px;
      border-left: 4px solid #38bdf8;
      border-radius: 4px;
      background: rgba(56, 189, 248, .10);
    }

    .document-dialog-body .repair-tech-info-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: -10px -12px 10px;
      padding: 6px 10px;
      border-radius: 4px 4px 0 0;
      border-bottom: 1px solid rgba(56, 189, 248, .36);
      background: rgba(56, 189, 248, .20);
    }

    .document-dialog-body .repair-tech-info-title-row .xml-use-image-wrap {
      flex: 0 0 auto;
      width: 26px;
      margin: 0;
      padding: 2px;
      border: 1px solid rgba(255, 255, 255, .28);
      border-radius: 4px;
      background: #ffffff;
    }

    .document-dialog-body .repair-tech-info-title-row .xml-use-image-wrap img {
      width: 100%;
      max-width: 100%;
      height: auto;
      border: 0;
      border-radius: 0;
    }

    .document-dialog-body .repair-tech-info-title-text {
      min-width: 0;
      color: #e0f7ff;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
    }

      },

    // 中文註解：定義基礎資料清單的欄位順序；雖然畫面固定為元件對應圖，仍保留給圖片預覽與資料整理流程使用。
    const tableColumns = {
      ProjectList: [
        "SSPNb",
        "FactCls",
        "Name_CN",
        "FactFileName",
        "ParentName",
        "Specify_AutoInt",
        "Specify_Nb",
        "Specify_Tw",
        "includeObjectName",
      ],
      PictureList_site: [
        "FileID",
        "Name_CN",
        "PictureType",
        "ParentName",
        "INFOOBJECTID",
      ],
      PictureList_pin: [
        "FileID",
        "Name_CN",
        "PictureType",
        "ParentName",
        "INFOOBJECTID",
      ],
    };

    const folderInput = document.getElementById("folderInput");
    const topToggleButton = document.getElementById("topToggleButton");
    const topToggleTitle = document.getElementById("topToggleTitle");
    const jsonPicker = document.getElementById("jsonPicker");
    const jsonSelect = document.getElementById("jsonSelect");
    const compePicker = document.getElementById("compePicker");
    const compeSelect = document.getElementById("compeSelect");
    const indexJsonPicker = document.getElementById("indexJsonPicker");
    const indexJsonSelect = document.getElementById("indexJsonSelect");
    const summaryElement = document.getElementById("summary");
    const tableContainer = document.getElementById("tableContainer");
    const imageDialog = document.getElementById("imageDialog");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogBody = document.getElementById("dialogBody");
    const dialogCloseButton = document.getElementById("dialogCloseButton");
    const documentDialog = document.getElementById("documentDialog");
    const documentDialogTitle = document.getElementById("documentDialogTitle");
    const documentDialogBody = document.getElementById("documentDialogBody");
    const documentDialogCloseButton = document.getElementById("documentDialogCloseButton");

    // 中文註解：建立 OpenCC 簡體轉繁體轉換器；輸入為頁面要顯示的文字，輸出為台灣繁體文字。
    const openccConverter = window.OpenCC
      ? window.OpenCC.Converter({ from: "cn", to: "tw" })
      : null;

    // 中文註解：將外部 JSON/XML 名稱轉成繁體；若 CDN 載入失敗或轉換出錯，回傳原文避免畫面中斷。
    function convertTextToTraditional(value) {
      const text = formatCellValue(value);
      if (!openccConverter || !text) {
        return text;
      }

      try {
        return openccConverter(text);
      } catch (error) {
        return text;
      }
    }

    // 中文註解：設定純文字節點顯示值；輸入為 DOM 節點與原始文字，輸出為已轉繁體的畫面文字。
    function setTraditionalText(element, value) {
      if (element) element.textContent = convertTextToTraditional(value);
    }

    // 中文註解：產生可安全插入 HTML 的繁體文字；輸入可為字串、陣列或物件，輸出為已 escape 的字串。
    function escapeTraditionalHtml(value) {
      return escapeHtml(convertTextToTraditional(value));
    }



    // 中文註解：切換上方載入區顯示狀態；收合後保留細控制列，避免誤點並增加內容可視高度。
    function setTopCollapsed(isCollapsed) {
      document.body.classList.toggle("top-collapsed", isCollapsed);
      setTraditionalText(topToggleButton, isCollapsed ? "展開載入區" : "收合載入區");
      setTraditionalText(topToggleTitle, isCollapsed ? "資料載入區已收合" : "資料載入區已展開");
      renderActiveView();
    }

    // 中文註解：使用者點擊控制列按鈕時，依目前 body class 反向切換收合狀態。
    function toggleTopPanel() {
      setTopCollapsed(!document.body.classList.contains("top-collapsed"));
    }

    // 中文註解：判斷單筆資料是否帶有「找不到檔案」註記；符合時畫面不顯示該筆資料。
    function isMissingFileNote(item) {
      const noteText = String(item && item._note ? item._note : "").toLowerCase();
      return noteText.includes("file not found") || noteText.includes("找不到檔案");
    }

    // 中文註解：安全取得指定資料清單；若 JSON 缺少欄位或不是陣列，回傳空陣列避免畫面錯誤。
    function getList(data, listName) {
      return Array.isArray(data && data[listName]) ? data[listName] : [];
    }



    // 中文註解：統一取得 PictureList 的 Name_CN 陣列；若來源是字串也轉成陣列方便後續比對。
    function getNameList(item) {
      const rawName = item && item.Name_CN;
      if (Array.isArray(rawName)) {
        return rawName.map((value) => String(value).trim()).filter(Boolean);
      }
      const textName = String(rawName || "").trim();
      return textName ? [textName] : [];
    }

    // 中文註解：從瀏覽器提供的資料夾相對路徑中移除第一層根目錄，方便比對同資料夾下的 Picture 與 JSON。
    function getFolderRelativePath(file) {
      const rawPath = file.webkitRelativePath || file.name;
      const pathParts = rawPath.split("/");
      return pathParts.length > 1 ? pathParts.slice(1).join("/") : rawPath;
    }

    // 中文註解：建立圖片檔索引，輸入是資料夾內所有檔案，輸出是小寫相對路徑到 File 物件的 Map；Pin 轉換後圖片會放在 Output/picture/pin/。
    function buildImageFileMap(files) {
      const imageFileMap = new Map();
      files.forEach((file) => {
        const relativePath = getFolderRelativePath(file).replaceAll("\\", "/").toLowerCase();
        if (relativePath.startsWith("picture/site/") || relativePath.startsWith("picture/pin/") || relativePath.startsWith("output/picture/site/") || relativePath.startsWith("output/picture/pin/")) {
          imageFileMap.set(relativePath, file);
        }
      });
      return imageFileMap;
    }

    // 中文註解：建立 XML 文件內嵌圖片索引；輸入是資料夾檔案，輸出為 Picture/XmlUse 檔名到 File 的 Map。
    function buildXmlUseImageFileMap(files) {
      const xmlUseImageFileMap = new Map();
      files.forEach((file) => {
        const relativePath = getFolderRelativePath(file).replaceAll("\\", "/").toLowerCase();
        if (relativePath.startsWith("picture/xmluse/")) {
          const fileName = relativePath.split("/").pop();
          if (fileName) xmlUseImageFileMap.set(fileName, file);
        }
      });
      return xmlUseImageFileMap;
    }



    // 中文註解：判斷 JSON 是否為 extract_compe_plugs_gui.py 輸出的名稱對應檔。
    function isCompeJsonFile(file) {
      return file.name.toLowerCase().endsWith(".json") && file.name.toLowerCase().includes("_compe_plugs");
    }

    // 中文註解：找出資料夾內所有名稱對應 JSON，若有多個會提供下拉選單切換。
    function findCompeJsonFiles(files) {
      return files
        .filter(isCompeJsonFile)
        .sort((leftFile, rightFile) => getFolderRelativePath(leftFile).localeCompare(getFolderRelativePath(rightFile)));
    }

    // 中文註解：判斷 JSON 是否為 XML 文件圖片對應檔；檔案內容用 GRAPHIC SRC 對應 Picture/XmlUse 實際檔名。
    function isXmlDocumentUseJsonFile(file) {
      return file.name.toLowerCase().endsWith(".json") && file.name.toLowerCase().includes("_xml_document_use");
    }

    // 中文註解：找出資料夾內所有 XML 文件圖片對應 JSON；若有多個，排序後自動讀取第一個。
    function findXmlDocumentUseJsonFiles(files) {
      return files
        .filter(isXmlDocumentUseJsonFile)
        .sort((leftFile, rightFile) => getFolderRelativePath(leftFile).localeCompare(getFolderRelativePath(rightFile)));
    }

    // 中文註解：判斷 JSON 是否為 explorer.html 預設使用的 index.json；排序時會優先顯示，方便使用者快速選到索引檔。
    function isExplorerIndexJsonFile(file) {
      return file.name.toLowerCase() === "index.json";
    }

    // 中文註解：找出可作為索引來源的 JSON；輸出包含所有非名稱對應 JSON，避免索引檔不是 index.json 時無法選取。
    function findIndexJsonFiles(files) {
      return files
        .filter((file) => file.name.toLowerCase().endsWith("index.json") && !isCompeJsonFile(file) && !isXmlDocumentUseJsonFile(file))
        .sort((leftFile, rightFile) => {
          const leftPriority = isExplorerIndexJsonFile(leftFile) ? 0 : 1;
          const rightPriority = isExplorerIndexJsonFile(rightFile) ? 0 : 1;
          if (leftPriority !== rightPriority) return leftPriority - rightPriority;
          return getFolderRelativePath(leftFile).localeCompare(getFolderRelativePath(rightFile));
        });
    }

    // 中文註解：判斷 JSON 是否較像主要資料檔；排序時讓 index 與輔助 JSON 排在後面，降低誤選機率。
    function isLikelyMainJson(file) {
      const fileName = file.name.toLowerCase();
      return fileName !== "index.json" && !fileName.includes("_compe_plugs");
    }

    // 中文註解：找出資料夾內所有 JSON，並將主要候選檔排在前面，供自動載入與下拉選擇使用。
    function findJsonFiles(files) {
      return files
        .filter((file) => file.name.toLowerCase().endsWith("_data.json") && !isCompeJsonFile(file) && !isExplorerIndexJsonFile(file) && !isXmlDocumentUseJsonFile(file))
        .sort((leftFile, rightFile) => {
          const leftPriority = isLikelyMainJson(leftFile) ? 0 : 1;
          const rightPriority = isLikelyMainJson(rightFile) ? 0 : 1;
          if (leftPriority !== rightPriority) {
            return leftPriority - rightPriority;
          }
          return getFolderRelativePath(leftFile).localeCompare(getFolderRelativePath(rightFile));
        });
    }

    // 中文註解：依 FileID 去除重複圖片資料；保留第一筆，避免同一張圖在列表中重複顯示。
    function uniqueByFileId(items) {
      const usedFileIds = new Set();
      return items.filter((item) => {
        const fileId = String(item && item.FileID ? item.FileID : "").trim();
        if (!fileId) {
          return true;
        }

        if (usedFileIds.has(fileId)) {
          return false;
        }

        usedFileIds.add(fileId);
        return true;
      });
    }

    // 中文註解：讀取原始 JSON 後建立畫面要用的資料；圖片清單同時會過濾 _note 並依 FileID 去重。
    function buildFilteredData(data) {
      const pictureListSite = getList(data, "PictureList_site").filter((item) => !isMissingFileNote(item));
      const pictureListPin = getList(data, "PictureList_pin").filter((item) => !isMissingFileNote(item));

      return {
        ProjectList: getList(data, "ProjectList").filter((item) => !isMissingFileNote(item)),
        PictureList_site: uniqueByFileId(pictureListSite),
        PictureList_pin: uniqueByFileId(pictureListPin),
      };
    }

    // 中文註解：依目前 tab 判斷圖片所在資料夾；ProjectList 不需要圖片欄位所以回傳空字串。
    function getPictureFolderName(tabName) {
      if (tabName === "PictureList_site") {
        return "site";
      }

      if (tabName === "PictureList_pin") {
        return "pin";
      }

      return "";
    }

    // 中文註解：依 PictureList 資料的 FileID 組出相對圖片路徑，用於查找資料夾檔案索引。
    function getPictureRelativePath(tabName, rowItem) {
      const folderName = getPictureFolderName(tabName);
      const fileId = String(rowItem && rowItem.FileID ? rowItem.FileID : "").trim();

      if (!folderName || !fileId) {
        return "";
      }

      return `picture/${folderName}/${fileId}.png`;
    }

    // 中文註解：確認指定 PictureList 資料是否已在選取資料夾中找到對應圖片。
    function hasPictureFile(tabName, rowItem) {
      const picturePath = getPictureRelativePath(tabName, rowItem);
      return picturePath ? appState.imageFileMap.has(picturePath) : false;
    }

    // 中文註解：將儲存格內容轉成可閱讀文字；陣列欄位用逗號串接，物件則保留 JSON 格式方便檢查。
    function formatCellValue(value) {
      if (Array.isArray(value)) {
        return value.join(", ");
      }

      if (value && typeof value === "object") {
        return JSON.stringify(value);
      }

      return value === undefined || value === null ? "" : String(value);
    }

    // 中文註解：避免 JSON 內容直接塞入 HTML 時破壞標籤或造成不必要的腳本執行風險。
    function escapeHtml(value) {
      return formatCellValue(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }



    // 中文註解：從 Site 的 Name_CN 取得查找 key；優先用不含 * 的值，若沒有才改用含 * 的原始值。
    function getSiteLookupKeys(siteItem) {
      const originalNames = getNameList(siteItem);
      const nonPlugKeys = originalNames.filter((name) => !name.includes("*"));
      return nonPlugKeys.length > 0 ? nonPlugKeys : originalNames;
    }

    // 中文註解：使用 _compe_plugs.json 將 key 轉為中文名稱；查不到時顯示該筆 PictureList_site 的原始 Name_CN。
    function resolveComponentNames(siteItem) {
      const keys = getSiteLookupKeys(siteItem);
      const originalNames = getNameList(siteItem);
      const resolvedNames = [];
      keys.forEach((key) => {
        const matchItems = Array.isArray(appState.compeData[key]) ? appState.compeData[key] : [];
        matchItems.forEach((matchItem) => {
          const name = String(matchItem && matchItem.name ? matchItem.name : "").trim();
          if (name && !resolvedNames.includes(name)) resolvedNames.push(name);
        });
      });
      return resolvedNames.length > 0 ? resolvedNames.join(" / ") : (originalNames.join(" / ") || "未命名項目");
    }

    // 中文註解：依原始 Name_CN 值去 PictureList_pin 內找第一筆對應資料，供右側列表顯示 icon。
    function findPinItemByName(nameText) {
      return appState.filteredData.PictureList_pin.find((pinItem) => getNameList(pinItem).includes(nameText)) || null;
    }

    // 中文註解：Pin 圖片一律從 Picture/Pin 查找，用於右側滑出面板。
    function getPinPictureRelativePath(rowItem) {
      const fileId = String(rowItem && rowItem.FileID ? rowItem.FileID : "").trim();
      return fileId ? `picture/pin/${fileId}.png` : "";
    }

    // 中文註解：依原始 Pin 圖片路徑推導轉換後圖片；輸入為 picture/pin/xxx.png，輸出為 Output/picture/pin/xxx_n.png。
    function getConvertedPinPictureRelativePath(rowItem) {
      const originalPath = getPinPictureRelativePath(rowItem);
      if (!originalPath) return "";
      return originalPath.replace(/([^/\\]+)\.png$/i, "$1.restyler.png").replace(/^/, "Output/");
    }


    // 中文註解：依 Site 位置圖 FileID 推導轉換後圖片；輸入為 PictureList_site 資料列，輸出為 Output/Picture/Site/{FileID}.restyler.png。
    function getConvertedSitePictureRelativePath(rowItem) {
      const fileId = String(rowItem && rowItem.FileID ? rowItem.FileID : "").trim();
      return fileId ? `output/picture/site/${fileId}.restyler.png` : "";
    }

    // 中文註解：依 Site 位置圖 FileID 推導轉換後標註 JSON；輸入為 PictureList_site 資料列，輸出為 Output/Picture/Site/{FileID}.restyler.json。
    function getConvertedSiteJsonRelativePath(rowItem) {
      const fileId = String(rowItem && rowItem.FileID ? rowItem.FileID : "").trim();
      return fileId ? `output/picture/site/${fileId}.restyler.json` : "";
    }

    // 中文註解：依元件 key 對應 PictureList_site；輸入為 _compe_plugs 的 key，輸出為第一筆對應 Site 圖資料。
    function findSiteItemByComponentKey(componentKey) {
      return appState.filteredData.PictureList_site.find((siteItem) => getNameList(siteItem).includes(componentKey)) || null;
    }

    // 中文註解：確認 plug 名稱是否完全相等存在於 PictureList_site 的 Name_CN 清單。
    function hasMatchingSiteNameForPlug(plugName) {
      const targetPlugName = String(plugName || "").trim();
      if (!targetPlugName) return false;
      return appState.filteredData.PictureList_site.some((siteItem) => getNameList(siteItem).includes(targetPlugName));
    }

    // 中文註解：建立第 5 分頁可顯示的元件清單；以 key.name 合併重複名稱，plugList 也同步合併去重。
    function buildComponentCompareItems() {
      const excludedNames = new Set(["中繼接頭", "節點"]);
      const itemMap = new Map();
      Object.keys(appState.compeData || {}).sort().forEach((componentKey) => {
        const siteItem = findSiteItemByComponentKey(componentKey);
        if (!siteItem) return;

        const groupItems = Array.isArray(appState.compeData[componentKey]) ? appState.compeData[componentKey] : [];
        groupItems.forEach((groupItem) => {
          const componentName = String(groupItem && groupItem.name ? groupItem.name : "").trim();
          if (!componentName || excludedNames.has(componentName)) return;

          const displayName = `${componentKey}.${componentName}`;
          const mapKey = displayName;
          const targetItem = itemMap.get(mapKey) || { key: componentKey, name: componentName, displayName, plugList: [], siteItem };
          const plugList = Array.isArray(groupItem.plugList) ? groupItem.plugList.map((plugName) => String(plugName).trim()).filter(Boolean) : [];
          plugList.forEach((plugName) => {
            if (!targetItem.plugList.includes(plugName)) targetItem.plugList.push(plugName);
          });
          itemMap.set(mapKey, targetItem);
        });
      });
      return Array.from(itemMap.values());
    }

    // 中文註解：取得第 5 分頁元件清單快取；輸入／輸出走 appState，避免點選左側項目時重複掃描 _compe_plugs 與 Site 圖資料。
    function getComponentCompareItems() {
      if (!appState.componentCompareItemsCache) {
        appState.componentCompareItemsCache = buildComponentCompareItems();
      }
      return appState.componentCompareItemsCache;
    }

    // 中文註解：將搜尋文字統一轉成小寫並去掉前後空白；輸入是任意值，輸出是可安全比對的字串。
    function normalizeSearchText(value) {
      return convertTextToTraditional(value).trim().toLocaleLowerCase("zh-Hant");
    }

    // 中文註解：清除左側過濾快取；輸入／輸出皆無，資料來源變更時呼叫，避免沿用舊 JSON 或舊圖片索引結果。
    function invalidateComponentFilterCache() {
      appState.componentCompareItemsCache = null;
      appState.componentFilterLookup = null;
      appState.componentFilterEligibilityMap = new Map();
    }

    // 中文註解：建立左側過濾用查找索引；輸出包含 Site 名稱、可開啟 Pin 圖名稱與文件名稱文字，避免每次點選都掃完整資料。
    function buildComponentFilterLookup() {
      const siteNameSet = new Set();
      appState.filteredData.PictureList_site.forEach((siteItem) => {
        getNameList(siteItem).forEach((siteName) => siteNameSet.add(siteName));
      });

      const availablePinNameSet = new Set();
      appState.filteredData.PictureList_pin.forEach((pinItem) => {
        const pinPath = getPinPictureRelativePath(pinItem);
        if (!pinPath || !appState.imageFileMap.has(pinPath)) return;
        getNameList(pinItem).forEach((pinName) => availablePinNameSet.add(pinName));
      });

      const documentNames = [];
      if (appState.currentIndexJsonFile) {
        Object.values(appState.indexData || {}).forEach((parents) => {
          Object.values(parents || {}).forEach((records) => {
            Object.keys(records || {}).forEach((nameCn) => documentNames.push(normalizeSearchText(nameCn)));
          });
        });
      }

      return {
        siteNameSet,
        availablePinNameSet,
        documentNameText: documentNames.join("\n"),
      };
    }

    // 中文註解：取得左側過濾查找索引；輸入／輸出皆走 appState，首次使用才建立，後續點選重繪可直接重用。
    function getComponentFilterLookup() {
      if (!appState.componentFilterLookup) {
        appState.componentFilterLookup = buildComponentFilterLookup();
      }
      return appState.componentFilterLookup;
    }

    // 中文註解：判斷元件是否至少有一筆可開啟的插頭圖片；輸入是左側元件資料，輸出布林值供過濾按鈕使用。
    function hasAvailablePlugImage(componentItem) {
      const lookup = getComponentFilterLookup();
      return componentItem.plugList.some((plugName) => lookup.siteNameSet.has(plugName) && lookup.availablePinNameSet.has(plugName));
    }

    // 中文註解：判斷索引 JSON 中是否有符合元件名稱的文件；輸入是元件中文名稱，輸出布林值避免只靠畫面字串判斷。
    function hasMatchingIndexDocument(componentName) {
      const query = normalizeSearchText(componentName);
      if (!query) return false;
      return getComponentFilterLookup().documentNameText.includes(query);
    }

    // 中文註解：過濾左側選單到同時具備插頭圖片與相關文件的元件；輸入是元件資料，輸出布林值供清單渲染使用。
    function hasPlugImageAndDocument(componentItem) {
      const cacheKey = componentItem.displayName;
      if (appState.componentFilterEligibilityMap.has(cacheKey)) {
        return appState.componentFilterEligibilityMap.get(cacheKey);
      }
      const isEligible = hasAvailablePlugImage(componentItem) && hasMatchingIndexDocument(componentItem.name);
      appState.componentFilterEligibilityMap.set(cacheKey, isEligible);
      return isEligible;
    }

    // 中文註解：取得目前左側實際可見的元件清單；輸入／輸出走 appState，會同時套用搜尋字與過濾按鈕狀態。
    function getVisibleComponentItems() {
      const allComponentItems = getComponentCompareItems();
      const keyword = normalizeSearchText(appState.componentSearchKeyword);
      return allComponentItems.filter((componentItem) => {
        if (appState.componentRequirePlugImageAndDocument && !hasPlugImageAndDocument(componentItem)) return false;
        if (!keyword) return true;
        const plugText = normalizeSearchText(componentItem.plugList.join(" "));
        return normalizeSearchText(componentItem.displayName).includes(keyword) || plugText.includes(keyword);
      });
    }

    // 中文註解：從相對路徑取出檔名；輸入可能是 picture/site/xxx.png，輸出只保留 xxx.png 供匯出 JSON 使用。
    function getFileNameFromRelativePath(relativePath) {
      return String(relativePath || "").replaceAll("\\", "/").split("/").filter(Boolean).pop() || "";
    }

    // 中文註解：將 Document 索引中的 FactFileName 正規化成 XML 檔名；輸入可有可無副檔名，輸出固定為 .xml 檔名。
    function normalizeDocumentFileName(factFileName) {
      const cleanFactFileName = String(factFileName || "").trim();
      if (!cleanFactFileName) return "";
      return cleanFactFileName.toLowerCase().endsWith(".xml") ? cleanFactFileName : `${cleanFactFileName}.xml`;
    }

    // 中文註解：依元件名稱找出目前索引 JSON 中符合的文件檔名；輸入是元件中文名稱，輸出為去重後的 XML 檔名清單。
    function getDocumentFileNamesByComponentName(componentName) {
      const query = normalizeSearchText(componentName);
      const fileNameSet = new Set();
      if (!query || !appState.currentIndexJsonFile) return [];

      Object.values(appState.indexData || {}).forEach((parents) => {
        Object.values(parents || {}).forEach((records) => {
          Object.keys(records || {}).forEach((nameCn) => {
            if (!normalizeSearchText(nameCn).includes(query)) return;
            const fileName = normalizeDocumentFileName((records[nameCn] || {}).FactFileName);
            if (fileName) fileNameSet.add(fileName);
          });
        });
      });

      return Array.from(fileNameSet);
    }

    // 中文註解：收集目前篩選後清單的 site/pin/doc 檔名；輸入／輸出皆為純資料，不觸動畫面，供隱藏下載指令使用。
    function buildFilteredComponentListExportData() {
      const siteSet = new Set();
      const pinSet = new Set();
      const docSet = new Set();

      getVisibleComponentItems().forEach((componentItem) => {
        const siteFileName = getFileNameFromRelativePath(getPictureRelativePath("PictureList_site", componentItem.siteItem));
        if (siteFileName) siteSet.add(siteFileName);

        componentItem.plugList.forEach((plugName) => {
          if (!hasMatchingSiteNameForPlug(plugName)) return;
          const pinItem = findPinItemByName(plugName);
          const pinPath = pinItem ? getPinPictureRelativePath(pinItem) : "";
          if (!pinPath || !appState.imageFileMap.has(pinPath)) return;
          const pinFileName = getFileNameFromRelativePath(pinPath);
          if (pinFileName) pinSet.add(pinFileName);
        });

        getDocumentFileNamesByComponentName(componentItem.name).forEach((fileName) => docSet.add(fileName));
      });

      return {
        site: Array.from(siteSet),
        pin: Array.from(pinSet),
        doc: Array.from(docSet),
      };
    }

    // 中文註解：隱藏 Console 指令；輸入／輸出皆無，會把目前篩選後清單下載成 JSON 檔案。
    function downloadFilteredComponentListJson() {
      const exportData = buildFilteredComponentListExportData();
      const jsonText = JSON.stringify(exportData, null, 2);
      const blob = new Blob([jsonText], { type: "application/json;charset=utf-8" });
      const downloadUrl = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = downloadUrl;
      link.download = "filtered_component_list.json";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(downloadUrl);
      return exportData;
    }

    window.downloadFilteredComponentListJson = downloadFilteredComponentListJson;
    // 中文註解：建立左側搜尋列 HTML；輸入目前搜尋字與過濾狀態，輸出含圖示按鈕的搜尋控制列。
    function renderComponentSearchControlsHtml() {
      const activeClass = appState.componentRequirePlugImageAndDocument ? " active" : "";
      const pressedText = appState.componentRequirePlugImageAndDocument ? "true" : "false";
      return `
        <div class="component-search-wrap">
          <input id="componentSearchInput" class="component-search-input" type="search" value="${escapeHtml(appState.componentSearchKeyword)}" placeholder="搜尋元件或 plugList">
          <button id="componentFilterToggle" class="component-filter-toggle${activeClass}" type="button" aria-label="只顯示同時有插頭圖片與文件的資料" aria-pressed="${pressedText}" title="只顯示同時有插頭圖片與文件的資料" data-console-command="downloadFilteredComponentListJson()"></button>
        </div>
      `;
    }

    // 中文註解：建立 explorer.html 格式索引樹；只用目前 componentName 篩選 nameCn，不混入 key 或 plugList。
    function renderIndexTreeHtml(componentName) {
      if (!appState.currentIndexJsonFile) {
        return '<div class="empty-state">尚未載入索引 JSON。</div>';
      }

      const indexData = appState.indexData || {};
      const query = normalizeSearchText(componentName);
      const documentTypes = Object.keys(indexData).sort((leftName, rightName) => leftName.localeCompare(rightName, "zh-Hant"));
      const groupHtml = [];
      let totalMatches = 0;

      documentTypes.forEach((documentType) => {
        const parents = indexData[documentType] || {};
        const parentHtml = [];

        Object.keys(parents).sort((leftName, rightName) => leftName.localeCompare(rightName, "zh-Hant")).forEach((parentName) => {
          const records = parents[parentName] || {};
          const matchedNames = Object.keys(records)
            .sort((leftName, rightName) => leftName.localeCompare(rightName, "zh-Hant"))
            .filter((nameCn) => !query || normalizeSearchText(nameCn).includes(query));

          if (matchedNames.length === 0) return;
          totalMatches += matchedNames.length;
          const leafHtml = matchedNames.map((nameCn) => {
            const record = records[nameCn] || {};
            return `
              <button
                class="index-leaf index-leaf-button"
                type="button"
                data-document-type="${escapeHtml(documentType)}"
                data-parent-name="${escapeHtml(parentName)}"
                data-name-cn="${escapeHtml(nameCn)}"
                data-xml-nb="${escapeHtml(record.XmlNb || "")}"
                data-fact-file-name="${escapeHtml(record.FactFileName || "")}"
                title="開啟 HTML 顯示文件"
              >
                <strong><span class="index-node-icon" aria-hidden="true">&#128196;</span><span>${escapeTraditionalHtml(nameCn)}</span></strong>
                <small>XmlNb: ${escapeHtml(record.XmlNb || "-")} | FactFileName: ${escapeHtml(record.FactFileName || "-")}</small>
              </button>
            `;
          }).join("");

          parentHtml.push(`
            <details class="index-branch" open>
              <summary><span class="index-node-label"><span class="index-node-icon" aria-hidden="true">&#128193;</span><span>${escapeTraditionalHtml(parentName)}</span></span><span class="index-count">${matchedNames.length} 項</span></summary>
              <div class="index-node-list">${leafHtml}</div>
            </details>
          `);
        });

        if (parentHtml.length === 0) return;
        groupHtml.push(`
          <details class="index-group" open>
            <summary><span class="index-node-label"><span class="index-node-icon" aria-hidden="true">&#128193;</span><span>${escapeTraditionalHtml(documentType)}</span></span><span class="index-count">${parentHtml.length} 群組</span></summary>
            <div class="index-node-list">${parentHtml.join("")}</div>
          </details>
        `);
      });

      if (groupHtml.length === 0) {
        return `<div class="empty-state">索引 JSON 中找不到符合「${escapeTraditionalHtml(componentName || "空白名稱")}」的文件。</div>`;
      }

      return `${groupHtml.join("")}`;
    }

    // 中文註解：讀取使用者所選資料夾中的文字檔；輸入是 File 物件，輸出是 UTF-8 文字，供 XML 解析使用。
    function readTextFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("讀取檔案失敗"));
        reader.readAsText(file, "utf-8");
      });
    }

    // 中文註解：把索引資料的 FactFileName 正規化成不含副檔名的基礎檔名；輸入可含 .xml，輸出供原始檔與轉換後檔共用。
    function normalizeDocumentBaseName(factFileName) {
      return String(factFileName || "").trim().replace(/\.xml$/i, "");
    }

    // 中文註解：依文件類型組出預期相對路徑；輸入為 FactFileName 與 original/converted，輸出為資料夾內要尋找的 XML 路徑。
    function getDocumentRelativePath(factFileName, documentKind) {
      const baseName = normalizeDocumentBaseName(factFileName);
      if (!baseName) return "";
      if (documentKind === "converted") return `Output/Document/${baseName}_n.xml`;
      return `Document/${baseName}.xml`;
    }

    // 中文註解：用已選根資料夾中的相對路徑尋找檔案；輸入為相對路徑，輸出為瀏覽器 File 物件或 null。
    function findFolderFileByRelativePath(relativePath) {
      const targetPath = String(relativePath || "").replaceAll("\\", "/").toLowerCase();
      if (!targetPath) return null;
      return appState.folderFiles.find((file) => getFolderRelativePath(file).replaceAll("\\", "/").toLowerCase() === targetPath) || null;
    }

    // 中文註解：依索引資料的 FactFileName 找出指定版本的 Document XML；輸入為檔名與版本，輸出為資料夾內對應 File。
    function findDocumentXmlFile(factFileName, documentKind) {
      return findFolderFileByRelativePath(getDocumentRelativePath(factFileName, documentKind));
    }

    // 中文註解：讀取並解析資料夾內的 JSON 檔；輸入是 File，輸出為物件，供轉換後 Site 圖標註使用。
    async function readJsonObjectFile(file) {
      const jsonText = await readTextFile(file);
      return JSON.parse(jsonText);
    }

    // 中文註解：載入瀏覽器 File 圖片；輸入是圖片 File，輸出已可繪製到 canvas 的 Image 物件。
    function loadImageFile(file) {
      return new Promise((resolve, reject) => {
        const imageUrl = URL.createObjectURL(file);
        const image = new Image();
        image.onload = () => {
          URL.revokeObjectURL(imageUrl);
          resolve(image);
        };
        image.onerror = () => {
          URL.revokeObjectURL(imageUrl);
          reject(new Error("圖片載入失敗"));
        };
        image.src = imageUrl;
      });
    }

    // 中文註解：正規化 OCR 與插頭名稱比對文字；輸入任意文字，輸出移除空白並轉小寫的比對 key。
    function normalizeCalloutMatchText(value) {
      return String(value || "").replace(/\s+/g, "").toLowerCase();
    }

    // 中文註解：判斷 OCR 是否出現在右側插頭清單；輸入 OCR 與目前顯示 plugList，輸出是否需要繪製該標註。
    function shouldDrawCalloutText(ocrText, plugNames) {
      const ocrKey = normalizeCalloutMatchText(ocrText);
      if (!ocrKey) return false;
      return plugNames.some((plugName) => {
        const plugKey = normalizeCalloutMatchText(plugName);
        return plugKey && (ocrKey.includes(plugKey) || plugKey.includes(ocrKey));
      });
    }

    // 中文註解：把標註 JSON 的座標依圖片實際尺寸縮放；輸入為原始座標、JSON 尺寸與圖片尺寸，輸出 canvas 座標。
    function scaleCalloutPoint(point, scaleX, scaleY) {
      return {
        x: Number(point && point.x ? point.x : 0) * scaleX,
        y: Number(point && point.y ? point.y : 0) * scaleY,
      };
    }

    // 中文註解：把 roi 轉為 canvas 矩形；輸入 JSON roi 與縮放比例，輸出 x/y/width/height。
    function scaleCalloutRoi(roi, scaleX, scaleY) {
      const x1 = Number(roi && roi.x1 ? roi.x1 : 0) * scaleX;
      const y1 = Number(roi && roi.y1 ? roi.y1 : 0) * scaleY;
      const x2 = Number(roi && roi.x2 ? roi.x2 : 0) * scaleX;
      const y2 = Number(roi && roi.y2 ? roi.y2 : 0) * scaleY;
      return {
        x: Math.min(x1, x2),
        y: Math.min(y1, y2),
        width: Math.abs(x2 - x1),
        height: Math.abs(y2 - y1),
      };
    }

    // 中文註解：在 canvas 上繪製 textbox；輸入為繪圖內容、矩形與 OCR，輸出為帶文字的標註框。
    function drawCalloutTextBox(context, rect, ocrText) {
      context.save();
      context.fillStyle = "rgba(255, 255, 255, .88)";
      context.strokeStyle = "#dc2626";
      context.lineWidth = 2;
      context.fillRect(rect.x, rect.y, rect.width, rect.height);
      context.strokeRect(rect.x, rect.y, rect.width, rect.height);
      context.fillStyle = "#991b1b";
      context.font = "700 14px Microsoft JhengHei, Arial, sans-serif";
      context.textBaseline = "middle";
      context.textAlign = "center";
      context.fillText(String(ocrText || ""), rect.x + rect.width / 2, rect.y + rect.height / 2, Math.max(20, rect.width - 8));
      context.restore();
    }

    // 中文註解：在 canvas 上繪製箭頭；輸入 arrow roi 與 pointer，輸出從 roi 起點指向 pointer 的箭頭線段。
    function drawCalloutArrow(context, arrowObject, scaleX, scaleY) {
      const roi = arrowObject && arrowObject.roi ? arrowObject.roi : {};
      const startPoint = scaleCalloutPoint({ x: roi.x1, y: roi.y1 }, scaleX, scaleY);
      const endPoint = scaleCalloutPoint(arrowObject && arrowObject.pointer ? arrowObject.pointer : { x: roi.x2, y: roi.y2 }, scaleX, scaleY);
      const angle = Math.atan2(endPoint.y - startPoint.y, endPoint.x - startPoint.x);
      const headLength = 14;

      context.save();
      context.strokeStyle = "#dc2626";
      context.fillStyle = "#dc2626";
      context.lineWidth = 3;
      context.lineCap = "round";
      context.beginPath();
      context.moveTo(startPoint.x, startPoint.y);
      context.lineTo(endPoint.x, endPoint.y);
      context.stroke();
      context.beginPath();
      context.moveTo(endPoint.x, endPoint.y);
      context.lineTo(endPoint.x - headLength * Math.cos(angle - Math.PI / 6), endPoint.y - headLength * Math.sin(angle - Math.PI / 6));
      context.lineTo(endPoint.x - headLength * Math.cos(angle + Math.PI / 6), endPoint.y - headLength * Math.sin(angle + Math.PI / 6));
      context.closePath();
      context.fill();
      context.restore();
    }

    // 中文註解：正規化插頭與 OCR 比對文字；輸入為任意文字，輸出為轉大寫且移除空白後的字串，避免大小寫與 OCR 空格影響比對。
    function normalizePointerMatchText(text) {
      return String(text || "").toUpperCase().replace(/\s+/g, "");
    }

    // 中文註解：計算兩段文字的 Levenshtein Distance；輸入為已正規化字串，輸出為最少編輯次數，供 OCR 模糊比對排序使用。
    function calculateLevenshteinDistance(sourceText, targetText) {
      const source = String(sourceText || "");
      const target = String(targetText || "");
      const sourceLength = source.length;
      const targetLength = target.length;
      if (!sourceLength) return targetLength;
      if (!targetLength) return sourceLength;

      let previousRow = Array.from({ length: targetLength + 1 }, (_, index) => index);
      for (let sourceIndex = 1; sourceIndex <= sourceLength; sourceIndex += 1) {
        const currentRow = [sourceIndex];
        for (let targetIndex = 1; targetIndex <= targetLength; targetIndex += 1) {
          const replaceCost = source[sourceIndex - 1] === target[targetIndex - 1] ? 0 : 1;
          currentRow[targetIndex] = Math.min(
            currentRow[targetIndex - 1] + 1,
            previousRow[targetIndex] + 1,
            previousRow[targetIndex - 1] + replaceCost
          );
        }
        previousRow = currentRow;
      }

      return previousRow[targetLength];
    }

    // 中文註解：依指定規則評分 plugName 與 OCR；輸入原始文字，輸出含優先層級、分數與距離的物件，完全相同最高，包含關係加分，主要仍依 Levenshtein 距離判斷相似度。
    function scorePointerTextMatch(plugName, ocrText) {
      const normalizedPlugName = normalizePointerMatchText(plugName);
      const normalizedOcrText = normalizePointerMatchText(ocrText);
      if (!normalizedPlugName || !normalizedOcrText) {
        return { priority: 0, score: 0, distance: Number.MAX_SAFE_INTEGER, lengthDiff: Number.MAX_SAFE_INTEGER };
      }

      if (normalizedPlugName === normalizedOcrText) {
        return { priority: 3, score: 1, distance: 0, lengthDiff: 0 };
      }

      const maxLength = Math.max(normalizedPlugName.length, normalizedOcrText.length);
      const lengthDiff = Math.abs(normalizedPlugName.length - normalizedOcrText.length);
      const distance = calculateLevenshteinDistance(normalizedPlugName, normalizedOcrText);
      const similarityScore = maxLength ? (maxLength - distance) / maxLength : 0;
      const hasContainMatch = normalizedPlugName.includes(normalizedOcrText) || normalizedOcrText.includes(normalizedPlugName);
      const containBonus = hasContainMatch ? 0.1 : 0;

      return { priority: 1, score: Math.min(0.999, similarityScore + containBonus), distance, lengthDiff };
    }

    // 中文註解：比較兩個 OCR 候選的評分；輸入為候選物件，輸出排序用數字，完全相同優先，其餘依相似分數、距離與長度差選出最接近結果。
    function comparePointerMatchCandidate(candidateA, candidateB) {
      if (candidateA.match.priority !== candidateB.match.priority) return candidateB.match.priority - candidateA.match.priority;
      if (candidateA.match.score !== candidateB.match.score) return candidateB.match.score - candidateA.match.score;
      if (candidateA.match.distance !== candidateB.match.distance) return candidateA.match.distance - candidateB.match.distance;
      return candidateA.match.lengthDiff - candidateB.match.lengthDiff;
    }
    // 中文註解：建立 textbox OCR 與同群組 arrow pointer 的候選清單；輸入為 annotationData，輸出可供 plugName 預先比對的 OCR-pointer 陣列。
    function getConvertedSitePointerCandidates(annotationData) {
      const objects = Array.isArray(annotationData && annotationData.objects) ? annotationData.objects : [];
      return objects
        .filter((objectItem) => objectItem && objectItem.type === "textbox" && objectItem.ocr)
        .map((textboxItem) => {
          const matchedArrow = objects.find((objectItem) => objectItem && objectItem.type === "arrow" && String(objectItem.groupId || "") === String(textboxItem.groupId || "") && objectItem.pointer);
          return matchedArrow ? { ocr: textboxItem.ocr, pointer: matchedArrow.pointer } : null;
        })
        .filter(Boolean);
    }

    // 中文註解：預先建立 plugName 對 pointer 的查表資料；輸入為 annotationData 與目前插頭清單，輸出 Map，並避免多個 plugName 重複占用同一個 OCR 結果。
    function buildConvertedSitePointerLookup(annotationData, plugNames) {
      const pointerLookup = new Map();
      const usedOcrKeys = new Set();
      const candidates = getConvertedSitePointerCandidates(annotationData);
      const uniquePlugNames = Array.from(new Set((Array.isArray(plugNames) ? plugNames : []).map((plugName) => String(plugName || "").trim()).filter(Boolean)));

      // 中文註解：先把所有 plugName 與 OCR 的可能組合攤平成評分清單，再由高分到低分分配，避免前面 plugName 的區域排序造成重複命中。
      const rankedMatches = uniquePlugNames
        .flatMap((plugName) => candidates.map((candidate) => ({
          plugName,
          pointer: candidate.pointer,
          ocr: candidate.ocr,
          ocrKey: normalizePointerMatchText(candidate.ocr),
          match: scorePointerTextMatch(plugName, candidate.ocr),
        })))
        .filter((candidate) => candidate.pointer && candidate.ocrKey && candidate.match.priority > 0)
        .sort(comparePointerMatchCandidate);

      rankedMatches.forEach((candidate) => {
        if (pointerLookup.has(candidate.plugName)) return;
        if (usedOcrKeys.has(candidate.ocrKey)) return;
        pointerLookup.set(candidate.plugName, candidate.pointer);
        usedOcrKeys.add(candidate.ocrKey);
      });

      return pointerLookup;
    }
    // 中文註解：依預先建立的 lookup 找出指定插頭名稱對應 pointer；輸入為 canvasState 與 plugName，輸出為 canvas 座標使用的 pointer 或 null。
    function findConvertedSitePointerByPlugName(canvasState, plugName) {
      if (!canvasState || !canvasState.plugPointerLookup) return null;
      return canvasState.plugPointerLookup.get(String(plugName || "").trim()) || null;
    }
    // 中文註解：把轉換後 Site 底圖重畫回 canvas；輸入為目前 canvas 狀態，輸出為清除所有箭頭後的乾淨底圖。
    function redrawConvertedSiteBaseImage(canvasState) {
      if (!canvasState || !canvasState.canvas || !canvasState.context || !canvasState.image) return;
      canvasState.context.clearRect(0, 0, canvasState.canvas.width, canvasState.canvas.height);
      canvasState.context.drawImage(canvasState.image, 0, 0);
    }

    // 中文註解：停止轉換後 Site 圖箭頭動畫；輸入／輸出走 appState，避免切換資料後舊動畫持續重繪。
    function stopConvertedSiteArrowAnimation() {
      if (appState.convertedSiteArrowFrameId) {
        cancelAnimationFrame(appState.convertedSiteArrowFrameId);
        appState.convertedSiteArrowFrameId = 0;
      }
      appState.activeConvertedSitePinKey = "";
    }

    // 中文註解：清除轉換後 Site 圖上的箭頭；輸入／輸出走目前 canvas 狀態，會保留底圖但移除提示箭頭。
    function clearConvertedSiteArrow() {
      stopConvertedSiteArrowAnimation();
      redrawConvertedSiteBaseImage(appState.convertedSiteCanvasState);
    }

    // 中文註解：繪製加粗提示箭頭；輸入為 pointer canvas 座標與閃爍透明度，輸出為藍白外框與黃綠本體交替閃爍的短箭頭。
    function drawBlinkingPointerArrow(context, pointer, canvasWidth, canvasHeight, alpha) {
      const pointerX = Math.max(0, Math.min(canvasWidth, pointer.x));
      const pointerY = Math.max(0, Math.min(canvasHeight, pointer.y));
      const arrowLength = Math.max(55, Math.min(105, canvasHeight * 0.18));
      const isNearBottom = pointerY > canvasHeight - arrowLength - 28;
      const startY = isNearBottom ? Math.max(0, pointerY - arrowLength) : Math.min(canvasHeight, pointerY + arrowLength);
      const startPoint = { x: pointerX, y: startY };
      const tipPoint = { x: pointerX, y: pointerY };
      const angle = Math.atan2(tipPoint.y - startPoint.y, tipPoint.x - startPoint.x);
      const headLength = 34;
      const lineEndPoint = {
        x: tipPoint.x - Math.cos(angle) * (headLength * .72),
        y: tipPoint.y - Math.sin(angle) * (headLength * .72),
      };
      const blinkRatio = Math.max(0, Math.min(1, (alpha - .35) / .65));
      const outlineColor = blinkRatio > .5 ? "#ffffff" : "#2563eb";
      const fillColor = blinkRatio > .5 ? "#bef264" : "#facc15";

      // 中文註解：先畫較粗的外框箭頭，提供藍白閃爍輪廓；線段終點退到箭頭頭部後方，避免凸出尖端。
      // context.globalAlpha = alpha;
      // context.strokeStyle = outlineColor;
      // context.fillStyle = outlineColor;
      // context.lineWidth = 18;
      // context.lineCap = "butt";
      // context.lineJoin = "round";
      // context.shadowColor = "rgba(37, 99, 235, .55)";
      // context.shadowBlur = 14;
      // context.beginPath();
      // context.moveTo(startPoint.x, startPoint.y);
      // context.lineTo(lineEndPoint.x, lineEndPoint.y);
      // context.stroke();
      // context.beginPath();
      // context.moveTo(tipPoint.x, tipPoint.y);
      // context.lineTo(tipPoint.x - headLength * Math.cos(angle - Math.PI / 6), tipPoint.y - headLength * Math.sin(angle - Math.PI / 6));
      // context.lineTo(tipPoint.x - headLength * Math.cos(angle + Math.PI / 6), tipPoint.y - headLength * Math.sin(angle + Math.PI / 6));
      // context.closePath();
      // context.fill();
      // context.restore();

      // 中文註解：再畫較細的黃綠本體箭頭，讓提示主體在外框內閃爍但不遮住指向尖端。
      context.save();
      context.globalAlpha = alpha;
      context.strokeStyle = fillColor;
      context.fillStyle = fillColor;
      context.lineWidth = 13;
      context.lineCap = "butt";
      context.lineJoin = "round";
      context.shadowColor = "rgba(132, 204, 22, .45)";
      context.shadowBlur = 8;
      context.beginPath();
      context.moveTo(startPoint.x, startPoint.y);
      context.lineTo(lineEndPoint.x, lineEndPoint.y);
      context.stroke();
      context.beginPath();
      context.moveTo(tipPoint.x, tipPoint.y);
      context.lineTo(tipPoint.x - headLength * Math.cos(angle - Math.PI / 6), tipPoint.y - headLength * Math.sin(angle - Math.PI / 6));
      context.lineTo(tipPoint.x - headLength * Math.cos(angle + Math.PI / 6), tipPoint.y - headLength * Math.sin(angle + Math.PI / 6));
      context.closePath();
      context.fill();
      context.restore();
    }

    // 中文註解：依右側 pin 按鈕點選結果啟動閃爍箭頭；輸入 plugName 與 pinKey，同一 pinKey 再點一次會清除箭頭。
    function toggleConvertedSiteArrowForPlug(plugName, pinKey) {
      const canvasState = appState.convertedSiteCanvasState;
      if (!canvasState || !canvasState.annotationData || !canvasState.image) return;
      if (appState.activeConvertedSitePinKey && appState.activeConvertedSitePinKey === pinKey) {
        clearConvertedSiteArrow();
        return;
      }

      stopConvertedSiteArrowAnimation();
      const rawPointer = findConvertedSitePointerByPlugName(canvasState, plugName);
      if (!rawPointer) {
        redrawConvertedSiteBaseImage(canvasState);
        return;
      }

      const pointer = scaleCalloutPoint(rawPointer, canvasState.scaleX, canvasState.scaleY);
      appState.activeConvertedSitePinKey = pinKey;
      const startedAt = performance.now();

      function drawFrame(now) {
        if (appState.activeConvertedSitePinKey !== pinKey) return;
        redrawConvertedSiteBaseImage(canvasState);
        const alpha = 0.35 + Math.abs(Math.sin((now - startedAt) / 220)) * 0.65;
        drawBlinkingPointerArrow(canvasState.context, pointer, canvasState.canvas.width, canvasState.canvas.height, alpha);
        appState.convertedSiteArrowFrameId = requestAnimationFrame(drawFrame);
      }

      appState.convertedSiteArrowFrameId = requestAnimationFrame(drawFrame);
    }

    // 中文註解：非同步載入轉換後 Site 圖與同名 JSON；輸入為 canvas 容器與路徑，輸出為只有底圖的 canvas 與暫存標註資料。
    async function renderConvertedSiteCanvas(canvasWrap, imagePath, jsonPath, plugNames = []) {
      stopConvertedSiteArrowAnimation();
      appState.convertedSiteCanvasState = null;
      if (!canvasWrap) return;
      const canvas = canvasWrap.querySelector(".converted-site-canvas");
      const status = canvasWrap.querySelector(".converted-canvas-status");
      const renderKey = `${imagePath}|${jsonPath}`;
      canvasWrap.dataset.convertedSiteKey = renderKey;
      if (!canvas || !status) return;

      function setConvertedStatus(message, isHidden) {
        status.textContent = message;
        status.classList.toggle("hidden", Boolean(isHidden));
      }

      const imageFile = appState.imageFileMap.get(String(imagePath || "").toLowerCase());
      const jsonFile = findFolderFileByRelativePath(jsonPath);
      if (!imageFile) {
        setConvertedStatus(`找不到轉換後圖片：${imagePath || "FileID 空白"}`, false);
        return;
      }
      if (!jsonFile) {
        setConvertedStatus(`找不到轉換後標註 JSON：${jsonPath || "FileID 空白"}`, false);
        return;
      }

      try {
        setConvertedStatus("轉換後圖片載入中...", false);
        const [image, annotationData] = await Promise.all([loadImageFile(imageFile), readJsonObjectFile(jsonFile)]);
        if (canvasWrap.dataset.convertedSiteKey !== renderKey) return;
        const sourceWidth = Number(annotationData && annotationData.width ? annotationData.width : image.naturalWidth) || image.naturalWidth;
        const sourceHeight = Number(annotationData && annotationData.height ? annotationData.height : image.naturalHeight) || image.naturalHeight;
        canvas.width = image.naturalWidth;
        canvas.height = image.naturalHeight;
        appState.convertedSiteCanvasState = {
          canvas,
          context: canvas.getContext("2d"),
          image,
          annotationData,
          plugPointerLookup: buildConvertedSitePointerLookup(annotationData, plugNames),
          scaleX: image.naturalWidth / sourceWidth,
          scaleY: image.naturalHeight / sourceHeight,
        };
        redrawConvertedSiteBaseImage(appState.convertedSiteCanvasState);
        setConvertedStatus("", true);
      } catch (error) {
        if (canvasWrap.dataset.convertedSiteKey !== renderKey) return;
        setConvertedStatus(`轉換後圖片繪製失敗：${error.message}`, false);
      }
    }
    // 中文註解：解析 Document XML 並檢查 parsererror；輸入是 XML 文字，輸出是 DOM Document。
    function parseDocumentXml(xmlText) {
      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmlText, "text/xml");
      const parseError = xmlDoc.querySelector("parsererror");
      if (parseError) throw new Error(`XML 解析錯誤：${parseError.textContent.trim()}`);
      return xmlDoc;
    }

    // 中文註解：正規化 XML GRAPHIC 的 SRC/LINKID；輸入可能含副檔名，輸出是對應 JSON 使用的不含副檔名 key。
    function normalizeGraphicKey(value) {
      return String(value || "").trim().replace(/\.[^.]+$/, "");
    }

    // 中文註解：依 xml_document_use 對應資料找出 Picture/XmlUse 圖檔；輸入為 GRAPHIC SRC/LINKID，輸出為圖片 File 與對應檔名。
    function findXmlUseImageFile(graphicSource, graphicLinkId) {
      const candidateKeys = [normalizeGraphicKey(graphicSource), normalizeGraphicKey(graphicLinkId)].filter(Boolean);
      for (const graphicKey of candidateKeys) {
        const mappedFileId = appState.xmlDocumentUseData[graphicKey];
        if (!mappedFileId) continue;
        const mappedFileName = String(mappedFileId).toLowerCase().endsWith(".png") ? String(mappedFileId) : `${mappedFileId}.png`;
        const imageFile = appState.xmlUseImageFileMap.get(mappedFileName.toLowerCase());
        if (imageFile) return { file: imageFile, fileName: mappedFileName, graphicKey };
        return { file: null, fileName: mappedFileName, graphicKey };
      }
      return { file: null, fileName: "", graphicKey: candidateKeys[0] || "" };
    }

    // 中文註解：建立 XML 文件圖片 DOM；找到 Picture/XmlUse 圖檔時顯示圖片，否則顯示可診斷的 placeholder。
    function renderXmlUseGraphic(graphicNode) {
      const graphicSource = graphicNode.getAttribute("SRC") || "";
      const graphicLinkId = graphicNode.getAttribute("LINKID") || "";
      const imageMatch = findXmlUseImageFile(graphicSource, graphicLinkId);
      if (!imageMatch.file) {
        const missingText = imageMatch.fileName
          ? `[圖片] 找不到 Picture/XmlUse/${imageMatch.fileName}（來源：${graphicSource || graphicLinkId || "未知圖片"}）`
          : `[圖片] 找不到 xml_document_use 對應：${graphicSource || graphicLinkId || "未知圖片"}`;
        return createDocumentEmptyMessage(missingText);
      }

      const imageUrl = URL.createObjectURL(imageMatch.file);
      appState.documentImageUrls.push(imageUrl);
      const wrapper = document.createElement("figure");
      wrapper.className = "xml-use-image-wrap";
      const image = document.createElement("img");
      image.src = imageUrl;
      image.alt = graphicSource || imageMatch.fileName;
      wrapper.appendChild(image);
      return wrapper;
    }

    // 中文註解：釋放文件 dialog 內 XML 圖片建立的暫存網址，避免多次開啟文件後佔用記憶體。
    function revokeDocumentImageUrls() {
      appState.documentImageUrls.forEach((imageUrl) => URL.revokeObjectURL(imageUrl));
      appState.documentImageUrls = [];
    }

    // 中文註解：從索引按鈕資料組出文件標題；輸入是索引節點資料，輸出為 dialog 標題文字。
    function describeIndexRecord(record) {
      return `${record.documentType || "未知類型"} / ${record.parentName || "未知群組"} / ${record.nameCn || "未命名文件"}`;
    }

    // 中文註解：在目前頁面開啟文件預覽 dialog；輸入是索引節點資料，輸出為左右並排的原始檔與轉換後內容。
    function openIndexDocumentWindow(record) {
      revokeDocumentImageUrls();
      const titleText = describeIndexRecord(record);
      summaryElement.classList.remove("error");
      const panels = renderDocumentCompareDialog(titleText);
      if (!documentDialog.open) documentDialog.showModal();

      loadDocumentXmlFromFolder(record, "original")
        .then((xmlDoc) => renderOriginalDocumentPanelContent(panels.originalContent, xmlDoc))
        .catch((error) => renderDocumentPanelError(panels.originalContent, error, titleText));

      loadDocumentXmlFromFolder(record, "converted")
        .then((xmlDoc) => renderDocumentPanelContent(panels.convertedContent, xmlDoc))
        .catch((error) => renderDocumentPanelError(panels.convertedContent, error, titleText));
    }

    // 中文註解：從目前已選資料夾讀取指定版本 XML；輸入是索引節點資料與版本，輸出是解析完成的 XML Document。
    async function loadDocumentXmlFromFolder(record, documentKind) {
      const relativePath = getDocumentRelativePath(record.factFileName, documentKind);
      const xmlFile = findDocumentXmlFile(record.factFileName, documentKind);
      if (!xmlFile) {
        throw new Error(relativePath ? `找不到 ${relativePath}` : "FactFileName 空白，無法定位文件");
      }

      const xmlText = await readTextFile(xmlFile);
      return parseDocumentXml(xmlText);
    }

    // 中文註解：更新文件預覽 dialog 的標題與狀態文字；輸入是標題與提示，輸出為目前頁面內的載入或錯誤畫面。
    function showDocumentDialogState(titleText, subtitleText) {
      documentDialogTitle.textContent = titleText;
      documentDialogBody.innerHTML = `<p class="document-page-subtitle">${escapeHtml(subtitleText)}</p>`;
    }

    // 中文註解：建立左右比較 dialog；輸入是文件標題，輸出為左右欄內容容器，供非同步載入結果填入。
    function renderDocumentCompareDialog(titleText) {
      documentDialogTitle.textContent = titleText;
      documentDialogBody.innerHTML = "";

      const layout = document.createElement("div");
      layout.className = "document-compare-layout";
      const originalContent = createDocumentComparePanel(layout, "原始檔", "正在載入 Document XML...", "original-document-panel");
      const convertedContent = createDocumentComparePanel(layout, "轉換後", "正在載入 Output/Document XML...");
      documentDialogBody.appendChild(layout);
      return { originalContent, convertedContent };
    }

    // 中文註解：建立單側文件面板；輸入為父層、標題與載入提示，輸出為可填入 XML 渲染結果的內容區。
    function createDocumentComparePanel(parentElement, headingText, loadingText, extraPanelClass) {
      const panel = document.createElement("section");
      panel.className = extraPanelClass ? `document-compare-panel ${extraPanelClass}` : "document-compare-panel";

      const heading = document.createElement("h2");
      heading.className = "document-compare-heading";
      heading.textContent = headingText;
      panel.appendChild(heading);

      const content = document.createElement("div");
      content.className = "document-compare-content";
      content.innerHTML = `<p class="document-page-subtitle">${escapeHtml(loadingText)}</p>`;
      panel.appendChild(content);
      parentElement.appendChild(panel);
      return content;
    }

    // 中文註解：把 XML 轉成 viewer-style HTML 放入指定欄位；輸入是欄位 DOM 與 XML Document，輸出為畫面中的文件內容。
    // 中文註解：把原始 Document XML 轉成左欄專用排版；輸入是欄位 DOM 與 XML Document，輸出為接近原廠文件的白底圖文版面。
    function renderOriginalDocumentPanelContent(contentElement, xmlDoc) {
      contentElement.innerHTML = "";
      contentElement.appendChild(buildOriginalDocumentHtmlView(xmlDoc));
    }

    // 中文註解：建立原始檔專用 HTML；輸入 XML Document，依文件根格式分流到功能描述或維修手冊版型，其他格式回退既有 viewer-style。
    function buildOriginalDocumentHtmlView(xmlDoc) {
      const root = xmlDoc && xmlDoc.documentElement;
      const functionalDescription = findFirstElementByLocalTag(root, "FUNCTIONALDESCRIPTION");
      if (functionalDescription) return buildOriginalFunctionalDescriptionView(functionalDescription);

      const repairDocument = findFirstElementByLocalTag(root, "REPAIRMANUALDOCUMENT") || findFirstElementByLocalTag(root, "REPAIRMANUALDOCUMENT_MOD");
      if (!repairDocument) return buildDocumentHtmlView(xmlDoc);
      const processNodes = collectOriginalRepairProcesses(repairDocument);

      const wrapper = document.createElement("div");
      wrapper.className = "original-document-view";
      renderOriginalRepairDocument(repairDocument, processNodes, wrapper);
      return wrapper;
    }

    // 中文註解：建立功能描述文件的左欄專用版型；輸入 FUNCTIONALDESCRIPTION，輸出標題、段落、圖片與索引表的白底文件排版。
    function buildOriginalFunctionalDescriptionView(functionalDescription) {
      const wrapper = document.createElement("div");
      wrapper.className = "original-functional-view";
      renderOriginalFunctionalDescription(functionalDescription, wrapper);
      return wrapper;
    }

    // 中文註解：依原始 XML 順序渲染功能描述；輸入 FUNCTIONALDESCRIPTION 與容器，輸出接近範例圖的章節內容。
    function renderOriginalFunctionalDescription(functionalDescription, container) {
      const documentTitle = getFirstChildText(functionalDescription, "DOCUMENTTITLE") || getFirstDescendantTextByLocalTag(functionalDescription, "HEADING") || "功能描述";
      const titleElement = document.createElement("h1");
      titleElement.className = "original-functional-title";
      titleElement.textContent = documentTitle;
      container.appendChild(titleElement);

      functionalDescription.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "DOCUMENTTITLE" || tag === "HEADING") return;
        renderOriginalFunctionalNode(child, container, { documentTitle });
      });
    }

    // 中文註解：渲染功能描述各層節點；輸入 XML 節點、容器與目前標題，輸出段落、章節標題、圖片與表格。
    function renderOriginalFunctionalNode(node, container, context) {
      if (node.nodeType === Node.TEXT_NODE) return;
      if (node.nodeType !== Node.ELEMENT_NODE) return;

      const tag = getLocalTagName(node);
      switch (tag) {
        case "FUNCDESCINTRODUCTORY":
        case "SUBSECTION2":
        case "CHAPTER":
          node.childNodes.forEach((child) => renderOriginalFunctionalNode(child, container, context));
          break;
        case "HEADING":
          renderOriginalFunctionalHeading(node, container, context);
          break;
        case "PARAGRAPH":
          renderOriginalFunctionalParagraph(node, container);
          break;
        case "GRAPHIC":
          renderOriginalFunctionalGraphic(node, container);
          break;
        case "TABLE":
          renderDocumentTable(node, container);
          break;
        default:
          node.childNodes.forEach((child) => renderOriginalFunctionalNode(child, container, context));
          break;
      }
    }

    // 中文註解：渲染功能描述章節標題；輸入 HEADING，輸出 h2，並跳過與文件標題相同的重複標題。
    function renderOriginalFunctionalHeading(headingNode, container, context) {
      const headingText = headingNode.textContent.trim();
      if (!headingText || headingText === (context && context.documentTitle)) return;
      const headingElement = document.createElement("h2");
      headingElement.className = "original-functional-section-title";
      headingElement.textContent = headingText;
      container.appendChild(headingElement);
    }

    // 中文註解：渲染功能描述段落；輸入 PARAGRAPH，輸出保留強調文字與圖片編號的 p，空白段落只當作視覺間距略過。
    function renderOriginalFunctionalParagraph(paragraphNode, container) {
      if (!paragraphNode.textContent.replace(/\s+/g, "").trim()) return;
      const paragraph = document.createElement("p");
      renderOriginalInlineChildren(paragraphNode, paragraph);
      container.appendChild(paragraph);
    }

    // 中文註解：渲染功能描述圖片；輸入 GRAPHIC，輸出單欄大圖 figure，圖片來源沿用既有 XmlUse 對應邏輯。
    function renderOriginalFunctionalGraphic(graphicNode, container) {
      const figure = document.createElement("figure");
      figure.className = "original-functional-figure";
      figure.appendChild(renderXmlUseGraphic(graphicNode));
      container.appendChild(figure);
    }

    // 中文註解：深度取得第一個指定 local tag 的文字；輸入根節點與 tag，輸出 trim 後文字，供功能描述缺標題時備援。
    function getFirstDescendantTextByLocalTag(node, targetTagName) {
      const found = findFirstElementByLocalTag(node, targetTagName);
      return found ? found.textContent.trim() : "";
    }

    // 中文註解：渲染原始維修文件外框；輸入維修文件節點與流程清單，只輸出 XML 實際提供的標題、提示與流程內容。
    function renderOriginalRepairDocument(repairDocument, processNodes, container) {
      const titleText = getFirstChildText(repairDocument, "TITLE") || "維修流程";
      const awNumberText = formatOriginalAwNumber(repairDocument.getAttribute("AWNUMBER") || "");
      const titleElement = document.createElement("h1");
      titleElement.className = "original-document-title";
      titleElement.textContent = awNumberText ? `${awNumberText} | ${titleText}` : titleText;
      container.appendChild(titleElement);

      renderOriginalRepairMoreInfo(repairDocument, container);
      renderOriginalRepairHints(repairDocument, container);
      renderOriginalRepairDocumentFallbackChildren(repairDocument, container);

      processNodes.forEach((processNode, processIndex) => renderOriginalRepairProcess(processNode, container, processIndex + 1));
    }

    // 中文註解：補上維修文件根層尚未被專用版型處理的內容；輸入 REPAIRMANUALDOCUMENT，輸出 INCLUDE_*、表格或其他文字節點。
    function renderOriginalRepairDocumentFallbackChildren(repairDocument, container) {
      const handledTags = new Set(["TITLE", "DOCUMENTLIST", "HINTS", "PREPROCESSES", "KEYPROCESS", "POSTPROCESSES"]);
      repairDocument.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE || handledTags.has(getLocalTagName(child))) return;
        renderOriginalGenericNode(child, container);
      });
    }

    // 中文註解：渲染維修文件上方的更多資訊提示；輸入維修文件節點，若有直接 DOCUMENTLIST 就輸出藍色底線提示。
    function renderOriginalRepairMoreInfo(repairDocument, container) {
      const documentList = getFirstChildElement(repairDocument, "DOCUMENTLIST");
      const hotspots = documentList ? findDescendantElementsByLocalTags(documentList, ["HOTSPOT"]) : [];
      if (hotspots.length === 0) return;

      container.appendChild(renderOriginalDocumentList(documentList));
    }

    // 中文註解：渲染維修文件 HINTS 上方資訊；輸入維修文件節點，輸出警告與有損壞危險區塊。
    function renderOriginalRepairHints(repairDocument, container) {
      const hintsNode = getLocalTagName(repairDocument) === "HINTS" ? repairDocument : getFirstChildElement(repairDocument, "HINTS");
      if (!hintsNode) return;

      const hintEntries = collectOriginalRepairHintEntries(hintsNode);
      if (hintEntries.length === 0) return;
