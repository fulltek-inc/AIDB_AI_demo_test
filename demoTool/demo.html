      const hintsWrap = document.createElement("div");
      hintsWrap.className = "original-repair-hints";
      hintEntries.forEach((hintNode) => renderOriginalRepairHintBox(hintNode, hintsWrap));
      container.appendChild(hintsWrap);
    }

    // 中文註解：收集 HINTS 裡可顯示的提示節點；輸入 HINTS，輸出 WARNING/DAMAGE/HINT/TECH_INFO，避免 INCLUDE_* 包住的內容被漏掉。
    function collectOriginalRepairHintEntries(hintsNode) {
      const hintEntries = [];
      collectOriginalHintEntryNodes(hintsNode, hintEntries);
      const hintOrder = { WARNING: 0, DAMAGE: 1, HINT: 2, TECH_INFO: 3 };
      return hintEntries.sort((left, right) => (hintOrder[getLocalTagName(left)] ?? 9) - (hintOrder[getLocalTagName(right)] ?? 9));
    }

    // 中文註解：遞迴收集提示節點；輸入任意 HINTS/INCLUDE_* 容器，輸出真正可讀的提示內容節點。
    function collectOriginalHintEntryNodes(parentNode, hintEntries) {
      if (!parentNode) return;
      parentNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "WARNING" || tag === "DAMAGE" || tag === "HINT" || tag === "TECH_INFO") {
          hintEntries.push(child);
          return;
        }
        if (tag.startsWith("INCLUDE_") || tag === "HINTS") collectOriginalHintEntryNodes(child, hintEntries);
      });
    }

    // 中文註解：渲染單一警示卡片；輸入 WARNING/DAMAGE/HINT，輸出含標題列、重點文字、條列與文件連結的區塊。
    function renderOriginalRepairHintBox(hintNode, container) {
      const hintTag = getLocalTagName(hintNode);
      const box = document.createElement("section");
      box.className = `original-hint-box ${hintTag === "WARNING" ? "warning" : hintTag === "TECH_INFO" ? "info" : "damage"}`;

      const header = document.createElement("div");
      header.className = "original-hint-header";
      const icon = document.createElement("span");
      icon.className = "original-hint-icon";
      icon.textContent = hintTag === "WARNING" ? "!" : "i";
      const signal = document.createElement("span");
      signal.textContent = getFirstChildText(hintNode, "SIGNALWORD") || (hintTag === "WARNING" ? "警告" : hintTag === "TECH_INFO" ? "技術性附加資訊" : "有损坏危险");
      header.appendChild(icon);
      header.appendChild(signal);
      box.appendChild(header);

      const body = document.createElement("div");
      body.className = "original-hint-body";
      appendOriginalHintParagraph(hintNode, body, "TYPE_OF_DANGER", "original-hint-main");
      appendOriginalHintParagraph(hintNode, body, "CONSEQUENCES", "original-hint-detail");
      appendOriginalHintInformations(hintNode, body);
      appendOriginalHintProtections(hintNode, body);
      appendOriginalHintDocumentLinks(hintNode, body);
      appendOriginalHintFallbackChildren(hintNode, body);
      box.appendChild(body);
      container.appendChild(box);
    }

    // 中文註解：渲染提示中的主旨段落；輸入提示節點與子節點名稱，輸出加粗段落。
    function appendOriginalHintParagraph(hintNode, container, childTagName, className) {
      const childNode = getFirstChildElement(hintNode, childTagName);
      const text = getOriginalHintTextWithoutDocumentList(childNode);
      if (!text) return;
      const paragraph = document.createElement("p");
      paragraph.className = className;
      paragraph.textContent = text;
      container.appendChild(paragraph);
    }

    // 中文註解：渲染提示中的防護事項；輸入提示節點，輸出條列清單，避免 DOCUMENTLIST 文字混入條列。
    // 中文註解：渲染提示中的 INFORMATION；輸入提示節點，輸出每個資訊段落，補足 TECH_INFO 等非警告類內容。
    function appendOriginalHintInformations(hintNode, container) {
      findDirectChildElementsByLocalTag(hintNode, "INFORMATION").forEach((informationNode) => {
        renderOriginalGenericNode(informationNode, container, { skipTags: ["DOCUMENTLIST"] });
      });
    }
    function appendOriginalHintProtections(hintNode, container) {
      const protectionNodes = findDirectChildElementsByLocalTag(hintNode, "PROTECTION");
      const protectionTexts = protectionNodes.map((node) => getOriginalHintTextWithoutDocumentList(node)).filter(Boolean);
      if (protectionTexts.length === 0) return;
      const list = document.createElement("ul");
      list.className = "original-hint-list";
      protectionTexts.forEach((text) => {
        const item = document.createElement("li");
        item.textContent = text;
        list.appendChild(item);
      });
      container.appendChild(list);
    }

    // 中文註解：渲染提示中的文件連結；輸入提示節點，輸出 AWNUMBER + TITLE 的藍色底線文字。
    // 中文註解：渲染提示中尚未被專用分支處理的子節點；輸入提示節點，輸出可讀文字、圖片或文件連結的 fallback。
    function appendOriginalHintFallbackChildren(hintNode, container) {
      const handledTags = new Set(["GRAPHIC", "SIGNALWORD", "TYPE_OF_DANGER", "CONSEQUENCES", "PROTECTION", "INFORMATION", "DOCUMENTLIST"]);
      hintNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE || handledTags.has(getLocalTagName(child))) return;
        renderOriginalGenericNode(child, container);
      });
    }
    function appendOriginalHintDocumentLinks(hintNode, container) {
      const documentLists = findDescendantElementsByLocalTags(hintNode, ["DOCUMENTLIST"]);
      const hotspots = [];
      documentLists.forEach((documentList) => {
        findDescendantElementsByLocalTags(documentList, ["HOTSPOT"]).forEach((hotspot) => hotspots.push(hotspot));
      });
      if (hotspots.length === 0) return;

      const linksWrap = document.createElement("div");
      linksWrap.className = "original-hint-links";
      hotspots.forEach((hotspot) => {
        const link = document.createElement("a");
        link.href = "javascript:void(0)";
        const awNumber = getFirstChildText(hotspot, "AWNUMBER");
        const title = getFirstChildText(hotspot, "TITLE");
        link.textContent = [awNumber, title].filter(Boolean).join("　");
        linksWrap.appendChild(link);
      });
      container.appendChild(linksWrap);
    }

    // 中文註解：取出提示文字但排除 DOCUMENTLIST；輸入提示子節點，輸出不含文件連結標題的純文字。
    function getOriginalHintTextWithoutDocumentList(node) {
      if (!node) return "";
      if (node.nodeType === Node.TEXT_NODE) return node.textContent.replace(/\s+/g, " ").trim();
      if (node.nodeType !== Node.ELEMENT_NODE) return "";
      if (getLocalTagName(node) === "DOCUMENTLIST" || getLocalTagName(node) === "GRAPHIC") return "";
      return Array.from(node.childNodes).map((child) => getOriginalHintTextWithoutDocumentList(child)).filter(Boolean).join(" ").replace(/\s+/g, " ").trim();
    }
    // 中文註解：通用渲染未知 XML 節點；輸入任意原始 XML 節點，輸出可讀文字、圖片、表格或文件連結，避免左側漏內容。
    function renderOriginalGenericNode(node, container, options) {
      if (!node) return;
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent.replace(/\s+/g, " ").trim();
        if (text) appendOriginalGenericParagraph(container, text);
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;

      const tag = getLocalTagName(node);
      const skipTags = new Set((options && options.skipTags) || []);
      if (skipTags.has(tag)) return;
      switch (tag) {
        case "GRAPHIC":
          container.appendChild(renderXmlUseGraphic(node));
          return;
        case "TABLE":
          renderDocumentTable(node, container);
          return;
        case "DOCUMENTLIST":
          container.appendChild(renderOriginalDocumentList(node));
          return;
        case "HOTSPOT":
          container.appendChild(renderOriginalDocumentLink(node));
          return;
        case "HINTS":
          renderOriginalRepairHints(node, container);
          return;
        case "WARNING":
        case "DAMAGE":
        case "HINT":
        case "TECH_INFO":
          renderOriginalRepairHintBox(node, container);
          return;
        case "PARAGRAPH":
        case "SIMPLE_TEXTFRAGMENT":
        case "TEXTFRAGMENT":
        case "LISTENTRY":
        case "LISTELEMENT":
        case "CONNECTION":
        case "DIMENSION":
        case "DESCRIPTION":
        case "PROPERTY":
        case "VALUE":
        case "UNIT":
        case "PART":
        case "UPI":
          appendOriginalGenericInlineNode(node, container);
          return;
        case "LIST":
        case "GENERALLIST":
          container.appendChild(renderOriginalGenericList(node));
          return;
        case "TITLE":
        case "SIGNALWORD":
          appendOriginalGenericTitle(container, node.textContent.trim());
          return;
        default:
          renderOriginalGenericChildren(node, container, options);
          return;
      }
    }

    // 中文註解：渲染未知節點的子節點；輸入容器節點與輸出容器，會依 XML 順序遞迴顯示可讀內容。
    function renderOriginalGenericChildren(parentNode, container, options) {
      parentNode.childNodes.forEach((child) => renderOriginalGenericNode(child, container, options));
    }

    // 中文註解：把 inline 型 XML 節點轉成段落；輸入文字片段節點，輸出保留強調與圖片編號的 p。
    function appendOriginalGenericInlineNode(node, container) {
      if (!node.textContent.replace(/\s+/g, "").trim()) return;
      const paragraph = document.createElement("p");
      renderOriginalInlineChildren(node, paragraph);
      container.appendChild(paragraph);
    }

    // 中文註解：加入通用段落；輸入容器與純文字，輸出單一 p，避免文字節點散落在畫面上。
    function appendOriginalGenericParagraph(container, text) {
      if (!text) return;
      const paragraph = document.createElement("p");
      paragraph.textContent = text;
      container.appendChild(paragraph);
    }

    // 中文註解：加入通用小標；輸入容器與標題文字，輸出簡單粗體標題。
    function appendOriginalGenericTitle(container, text) {
      if (!text) return;
      const title = document.createElement("div");
      title.className = "original-generic-title";
      title.textContent = text;
      container.appendChild(title);
    }

    // 中文註解：渲染原始文件連結清單；輸入 DOCUMENTLIST，輸出每個 HOTSPOT 的 block 連結。
    function renderOriginalDocumentList(documentListNode) {
      const links = document.createElement("div");
      links.className = "original-document-links";
      const hotspots = findDescendantElementsByLocalTags(documentListNode, ["HOTSPOT"]);
      hotspots.forEach((hotspot) => links.appendChild(renderOriginalDocumentLink(hotspot)));
      if (links.children.length === 0 && documentListNode.textContent.trim()) appendOriginalGenericParagraph(links, documentListNode.textContent.trim());
      return links;
    }

    // 中文註解：渲染單一原始文件連結；輸入 HOTSPOT，輸出 div，避免文件清單擠成同一行。
    function renderOriginalDocumentLink(hotspotNode) {
      const link = document.createElement("div");
      link.className = "original-document-link";
      const awNumber = getFirstChildText(hotspotNode, "AWNUMBER");
      const title = getFirstChildText(hotspotNode, "TITLE");
      link.textContent = [awNumber, title].filter(Boolean).join(" ") || hotspotNode.textContent.trim();
      const linkId = hotspotNode.getAttribute("LINKID") || "";
      if (linkId) link.setAttribute("title", `HOTSPOT: ${linkId}`);
      return link;
    }

    // 中文註解：渲染通用清單；輸入 LIST/GENERALLIST，輸出 ul，未知清單內容也會保留下來。
    function renderOriginalGenericList(listNode) {
      const list = document.createElement("ul");
      list.className = "original-hint-list";
      listNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const item = document.createElement("li");
        renderOriginalGenericNode(child, item);
        if (!item.textContent.trim()) item.textContent = child.textContent.replace(/\s+/g, " ").trim();
        if (item.textContent.trim()) list.appendChild(item);
      });
      return list;
    }
    // 中文註解：將 AWNUMBER 轉成畫面標題用的分段格式；輸入例如 3540001，輸出 35 40 001。
    function formatOriginalAwNumber(awNumber) {
      const cleanValue = String(awNumber || "").trim();
      if (/^\d{7}$/.test(cleanValue)) return `${cleanValue.slice(0, 2)} ${cleanValue.slice(2, 4)} ${cleanValue.slice(4)}`;
      return cleanValue;
    }

    // 中文註解：收集原始維修文件的完整流程；輸入 REPAIRMANUALDOCUMENT，依序輸出前置、核心、後置 PROCESS，避免漏掉 PREPROCESSES。
    function collectOriginalRepairProcesses(repairDocument) {
      const processNodes = [];
      ["PREPROCESSES", "KEYPROCESS", "POSTPROCESSES"].forEach((sectionTagName) => {
        const sectionNode = getFirstChildElement(repairDocument, sectionTagName);
        if (!sectionNode) return;
        collectOriginalProcessNodes(sectionNode, processNodes);
      });
      return processNodes;
    }

    // 中文註解：遞迴收集流程節點；輸入流程容器與輸出陣列，會穿透 INCLUDE_PROCESS 但保留每個 PROCESS 自成章節。
    function collectOriginalProcessNodes(parentNode, processNodes) {
      if (!parentNode) return;
      parentNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "PROCESS") {
          processNodes.push(child);
          collectOriginalProcessNodes(child, processNodes);
          return;
        }
        if (tag === "INCLUDE_PROCESS" || tag === "PREPROCESSES" || tag === "KEYPROCESS" || tag === "POSTPROCESSES" || tag === "STEPS") {
          collectOriginalProcessNodes(child, processNodes);
        }
      });
    }

    // 中文註解：渲染單一維修流程；輸入 PROCESS 與流程序號，輸出流程標題、流程提示與每個操作步驟的圖文列。
    function renderOriginalRepairProcess(processNode, container, processIndex) {
      const processSection = document.createElement("section");
      processSection.className = "original-process";

      const processTitle = document.createElement("h3");
      processTitle.className = "original-process-title";
      processTitle.textContent = `${processIndex}-${getFirstChildText(processNode, "TITLE") || "未命名流程"}`;
      processSection.appendChild(processTitle);
      renderOriginalRepairHints(processNode, processSection);

      const stepsNode = getFirstChildElement(processNode, "STEPS");
      const stepNodes = stepsNode ? collectOriginalStepNodes(stepsNode) : [];
      stepNodes.forEach((stepNode) => renderOriginalRepairStep(stepNode, processSection));
      renderOriginalProcessFallbackChildren(processNode, processSection);
      container.appendChild(processSection);
    }

    // 中文註解：補上流程層未被專用版型處理的內容；輸入 PROCESS，輸出 PARTS/DOCUMENTLIST/ADDITIONALDATA 等可讀節點。
    function renderOriginalProcessFallbackChildren(processNode, container) {
      const handledTags = new Set(["TITLE", "HINTS", "STEPS"]);
      processNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE || handledTags.has(getLocalTagName(child))) return;
        renderOriginalGenericNode(child, container);
      });
    }

    // 中文註解：收集流程中的操作步驟；輸入 STEPS，輸出 OPERATINGSTEP，會深入 CHECKSTEP 但跳過巢狀 INCLUDE_PROCESS 以免重複顯示。
    function collectOriginalStepNodes(parentNode) {
      const stepNodes = [];
      if (!parentNode) return stepNodes;
      parentNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "OPERATINGSTEP") {
          stepNodes.push(child);
          return;
        }
        if (tag === "INCLUDE_PROCESS" || tag === "PROCESS") return;
        collectOriginalStepNodes(child).forEach((stepNode) => stepNodes.push(stepNode));
      });
      return stepNodes;
    }

    // 中文註解：渲染原始檔的單一步驟；輸入 OPERATINGSTEP，輸出左側圖片、右側條列說明的同列版面。
    function renderOriginalRepairStep(stepNode, container) {
      const row = document.createElement("div");
      row.className = "original-step-row";
      const graphicNodes = findDirectChildElementsByLocalTag(stepNode, "GRAPHIC");
      if (graphicNodes.length === 0) row.classList.add("original-step-row-no-graphic");

      if (graphicNodes.length > 0) {
        const graphicsColumn = document.createElement("div");
        graphicsColumn.className = "original-step-graphics";
        graphicNodes.forEach((graphicNode) => graphicsColumn.appendChild(renderXmlUseGraphic(graphicNode)));
        row.appendChild(graphicsColumn);
      }

      const textColumn = document.createElement("div");
      textColumn.className = "original-step-text";
      const instructionNodes = findDirectChildElementsByLocalTag(stepNode, "INSTRUCTION");
      const list = document.createElement("ul");
      instructionNodes.forEach((instructionNode) => appendOriginalInstructionItems(instructionNode, list));
      appendOriginalStepFallbackItems(stepNode, list);
      if (list.children.length === 0 && stepNode.textContent.trim()) {
        const item = document.createElement("li");
        item.textContent = stepNode.textContent.replace(/\s+/g, " ").trim();
        list.appendChild(item);
      }
      textColumn.appendChild(list);
      row.appendChild(textColumn);
      container.appendChild(row);
    }

    // 中文註解：補上步驟中非圖片、非 INSTRUCTION 的直接內容；輸入 OPERATINGSTEP，輸出額外資料、提示或文件連結條列。
    function appendOriginalStepFallbackItems(stepNode, listElement) {
      const handledTags = new Set(["GRAPHIC", "INSTRUCTION"]);
      stepNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE || handledTags.has(getLocalTagName(child))) return;
        appendOriginalInstructionChildItem(child, listElement);
      });
    }

    // 中文註解：把 INSTRUCTION 內所有可讀內容轉成條列；輸入 instruction 節點，輸出段落、提示、文件連結與其他 fallback 內容。
    function appendOriginalInstructionItems(instructionNode, listElement) {
      instructionNode.childNodes.forEach((child) => {
        if (child.nodeType === Node.TEXT_NODE) {
          appendOriginalInstructionChildItem(child, listElement);
          return;
        }
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "TEXTFRAGMENT") {
          child.childNodes.forEach((fragmentChild) => appendOriginalInstructionChildItem(fragmentChild, listElement));
          return;
        }
        appendOriginalInstructionChildItem(child, listElement);
      });
    }

    // 中文註解：渲染單一 INSTRUCTION 子節點；輸入任意子節點，輸出一個 li，避免未知標籤被忽略。
    function appendOriginalInstructionChildItem(childNode, listElement) {
      if (childNode.nodeType === Node.TEXT_NODE) {
        const text = childNode.textContent.replace(/\s+/g, " ").trim();
        if (!text) return;
        const item = document.createElement("li");
        item.textContent = text;
        listElement.appendChild(item);
        return;
      }
      if (childNode.nodeType !== Node.ELEMENT_NODE) return;
      const item = document.createElement("li");
      renderOriginalGenericNode(childNode, item);
      if (item.textContent.trim() || item.children.length > 0) listElement.appendChild(item);
    }

    // 中文註解：遞迴渲染原始檔段落內文；輸入 XML inline 節點，輸出文字、圖片編號與強調文字。
    function renderOriginalInlineChildren(node, container) {
      node.childNodes.forEach((child) => {
        if (child.nodeType === Node.TEXT_NODE) {
          container.appendChild(document.createTextNode(child.textContent.replace(/\s+/g, " ")));
          return;
        }
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "IMAGENUMBER" || tag === "HOTSPOT") {
          const span = document.createElement("span");
          span.className = tag === "IMAGENUMBER" ? "original-image-number" : "hotspot";
          span.textContent = child.textContent.trim();
          container.appendChild(span);
          return;
        }
        if (tag === "EMPHASIZE" || tag === "EMPHASIZE1" || tag === "EMPHASIZE2" || tag === "EMPHASIZE3") {
          const strong = document.createElement("strong");
          renderOriginalInlineChildren(child, strong);
          container.appendChild(strong);
          return;
        }
        renderOriginalInlineChildren(child, container);
      });
    }

    // 中文註解：尋找直接子層指定 local tag；輸入父節點與 tag，輸出符合條件的 Element 陣列。
    function findDirectChildElementsByLocalTag(parentNode, childTagName) {
      const matches = [];
      const target = String(childTagName || "").toUpperCase();
      if (!parentNode) return matches;
      parentNode.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === target) matches.push(child);
      });
      return matches;
    }

    // 中文註解：深度收集指定 local tags；輸入根節點與 tag 清單，輸出用於原始檔條列文字的節點陣列。
    function findDescendantElementsByLocalTags(parentNode, tagNames) {
      const matches = [];
      const targets = new Set((tagNames || []).map((tagName) => String(tagName).toUpperCase()));
      if (!parentNode) return matches;
      parentNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        if (targets.has(getLocalTagName(child))) matches.push(child);
        findDescendantElementsByLocalTags(child, tagNames).forEach((match) => matches.push(match));
      });
      return matches;
    }
    function renderDocumentPanelContent(contentElement, xmlDoc) {
      contentElement.innerHTML = "";
      contentElement.appendChild(buildDocumentHtmlView(xmlDoc));
    }

    // 中文註解：在單側欄位呈現載入錯誤；輸入為欄位 DOM 與錯誤，輸出為不影響另一側的錯誤提示。
    function renderDocumentPanelError(contentElement, error, titleText) {
      const message = error && error.message ? error.message : String(error || "未知錯誤");
      contentElement.innerHTML = "";
      contentElement.appendChild(createDocumentEmptyMessage(`無法載入文件：${message}`));
      summaryElement.textContent = `無法載入文件 ${titleText}：${message}`;
      summaryElement.classList.add("error");
    }
    // 中文註解：建立 HTML 顯示根節點；輸入是 XML Document，輸出是 viewer-style 的文件內容容器。
    function buildDocumentHtmlView(xmlDoc) {
      const inner = document.createElement("div");
      inner.className = "html-view";
      const root = xmlDoc && xmlDoc.documentElement;
      if (!root) {
        inner.appendChild(createDocumentEmptyMessage("沒有可呈現的 XML 內容。"));
        return inner;
      }

      const functionalDescription = findFirstElementByLocalTag(root, "FUNCTIONALDESCRIPTION");
      const repairDocument = findFirstElementByLocalTag(root, "REPAIRMANUALDOCUMENT") || findFirstElementByLocalTag(root, "REPAIRMANUALDOCUMENT_MOD");
      if (functionalDescription) {
        renderFunctionalDocument(functionalDescription, inner);
        return inner;
      }

      if (repairDocument) {
        renderRepairDocument(repairDocument, inner);
        return inner;
      }

      inner.appendChild(createDocumentEmptyMessage("找不到可渲染的根元素。"));
      return inner;
    }

    // 中文註解：渲染功能說明文件；輸入 FUNCTIONALDESCRIPTION，輸出含 viewer 風格標題與內文的 DOM。
    function renderFunctionalDocument(functionalDescription, container) {
      const titleElement = getFirstChildElement(functionalDescription, "DOCUMENTTITLE");
      if (titleElement) {
        const titleDiv = document.createElement("div");
        titleDiv.className = "doc-title";
        titleDiv.textContent = titleElement.textContent.trim();
        container.appendChild(titleDiv);
      }

      const innerDiv = document.createElement("div");
      innerDiv.id = "inner-content";
      container.appendChild(innerDiv);
      functionalDescription.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE) {
          const tag = getLocalTagName(child);
          if (tag === "DOCUMENTTITLE" || tag === "HEADING") return;
        }
        renderDocumentNode(child, innerDiv);
      });
    }

    // 中文註解：渲染維修文件；輸入 REPAIRMANUALDOCUMENT 節點，輸出含步驟、提示與中繼資訊的 DOM。
    function renderRepairDocument(repairDocument, container) {
      const titleText = getFirstChildText(repairDocument, "TITLE") || "維修流程";
      const titleDiv = document.createElement("div");
      titleDiv.className = "doc-title";
      titleDiv.textContent = titleText;
      container.appendChild(titleDiv);

      const innerDiv = document.createElement("div");
      innerDiv.id = "inner-content";
      innerDiv.className = "repair-doc";
      container.appendChild(innerDiv);

      const metaBits = [];
      const awNumber = repairDocument.getAttribute("AWNUMBER");
      const language = repairDocument.getAttribute("LANGUAGE");
      if (awNumber) metaBits.push(`AWNUMBER ${awNumber}`);
      if (language) metaBits.push(language);
      if (metaBits.length) {
        const metaDiv = document.createElement("div");
        metaDiv.className = "repair-meta";
        const metaSpan = document.createElement("span");
        metaSpan.textContent = metaBits.join(" · ");
        metaDiv.appendChild(metaSpan);
        innerDiv.appendChild(metaDiv);
      }

      repairDocument.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === "TITLE") return;
        renderRepairNode(child, innerDiv, { depth: 0 });
      });
    }

    // 中文註解：遞迴轉換一般功能文件 XML 節點；使用 localName 判斷，支援 proc:GRAPHIC 等 namespace tag。
    function renderDocumentNode(node, container) {
      if (node.nodeType === Node.TEXT_NODE) {
        const text = node.textContent.replace(/\s+/g, " ").trim();
        if (text) container.appendChild(document.createTextNode(text));
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;

      const tag = getLocalTagName(node);
      switch (tag) {
        case "FUNCTIONALDESCRIPTION":
          renderDocumentChildren(node, container);
          break;
        case "DOCUMENTTITLE":
          break;
        case "FUNCDESCINTRODUCTORY":
        case "CHAPTER":
        case "SUBSECTION2": {
          const section = document.createElement("section");
          section.className = tag === "FUNCDESCINTRODUCTORY" ? "intro" : tag === "CHAPTER" ? "chapter" : "subsection";
          renderDocumentChildren(node, section);
          container.appendChild(section);
          break;
        }
        case "HEADING":
        case "TITLE": {
          const heading = document.createElement("h2");
          heading.textContent = node.textContent.trim();
          container.appendChild(heading);
          break;
        }
        case "PARAGRAPH": {
          const paragraph = document.createElement("p");
          renderDocumentChildren(node, paragraph);
          container.appendChild(paragraph);
          break;
        }
        case "EMPHASIZE":
        case "EMPHASIZE1":
        case "EMPHASIZE2":
        case "EMPHASIZE3": {
          const strong = document.createElement("strong");
          renderDocumentChildren(node, strong);
          container.appendChild(strong);
          break;
        }
        case "LIST":
        case "GENERALLIST":
          container.appendChild(renderDocumentList(node));
          break;
        case "LISTENTRY":
        case "LISTELEMENT":
          container.appendChild(renderDocumentListItem(node));
          break;
        case "LABEL": {
          const label = document.createElement("span");
          label.className = "xml-list-label";
          label.textContent = node.textContent.trim();
          container.appendChild(label);
          break;
        }
        case "GRAPHIC":
          container.appendChild(renderXmlUseGraphic(node));
          break;
        case "HOTSPOT":
          container.appendChild(renderHotspot(node));
          break;
        case "TABLE":
          renderDocumentTable(node, container);
          break;
        default:
          renderDocumentChildren(node, container);
          break;
      }
    }

    // 中文註解：遞迴轉換維修文件 XML 節點；輸入是節點、容器與步驟上下文，輸出為 viewer-style 維修內容。
    function renderRepairNode(node, container, context) {
      if (node.nodeType === Node.TEXT_NODE) {
        if (node.textContent.trim()) container.appendChild(document.createTextNode(node.textContent));
        return;
      }
      if (node.nodeType !== Node.ELEMENT_NODE) return;

      const tag = getLocalTagName(node);
      const currentContext = context || { depth: 0 };
      switch (tag) {
        case "PROCESS":
          renderRepairProcess(node, container, currentContext);
          break;
        case "INCLUDE_PROCESS":
        case "PREPROCESSES":
        case "HINTS":
        case "STEPS":
        case "INCLUDE_HINT":
        case "INCLUDE_WARNING":
        case "INCLUDE_DAMAGE":
        case "INCLUDE_TECH_INFO":
          renderDocumentChildren(node, container, renderRepairNode, currentContext);
          break;
        case "OPERATINGSTEP":
          renderRepairStep(node, container, currentContext);
          break;
        case "INSTRUCTION": {
          const instructionDiv = document.createElement("div");
          instructionDiv.className = "repair-instruction";
          renderDocumentChildren(node, instructionDiv, renderRepairNode, currentContext);
          container.appendChild(instructionDiv);
          break;
        }
        case "WARNING":
        case "DAMAGE":
        case "HINT":
          renderRepairHint(node, container, currentContext);
          break;
        case "TECH_INFO":
          renderRepairTechInfoBlock(node, container, currentContext);
          break;
        case "GRAPHIC":
          container.appendChild(renderXmlUseGraphic(node));
          break;
        case "ILLUSTRATION": {
          const figure = document.createElement("div");
          figure.className = "repair-illustration";
          renderDocumentChildren(node, figure, renderRepairNode, currentContext);
          container.appendChild(figure);
          break;
        }
        case "HOTSPOT":
          container.appendChild(renderHotspot(node));
          break;
        case "DOCUMENTLIST":
          container.appendChild(renderRepairDocumentList(node));
          break;
        case "TITLE":
          if (node.textContent.trim()) {
            const heading = document.createElement("h2");
            heading.textContent = node.textContent.trim();
            container.appendChild(heading);
          }
          break;
        case "PARAGRAPH": {
          const paragraph = document.createElement("p");
          renderDocumentChildren(node, paragraph, renderRepairNode, currentContext);
          container.appendChild(paragraph);
          break;
        }
        case "TEXTFRAGMENT":
        case "SIMPLE_TEXTFRAGMENT":
          renderDocumentChildren(node, container, renderRepairNode, currentContext);
          break;
        case "TYPE_OF_DANGER":
        case "CONSEQUENCES":
        case "PROTECTION":
        case "INFORMATION":
          renderRepairHintContentBlock(node, container, currentContext);
          break;
        case "EMPHASIZE":
        case "EMPHASIZE1":
        case "EMPHASIZE2":
        case "EMPHASIZE3": {
          const strong = document.createElement("strong");
          renderDocumentChildren(node, strong, renderRepairNode, currentContext);
          container.appendChild(strong);
          break;
        }
        case "LIST":
        case "GENERALLIST":
          container.appendChild(renderDocumentList(node));
          break;
        case "LISTENTRY":
        case "LISTELEMENT":
          container.appendChild(renderDocumentListItem(node));
          break;
        case "LABEL": {
          const label = document.createElement("span");
          label.className = "xml-list-label";
          label.textContent = node.textContent.trim();
          container.appendChild(label);
          break;
        }
        case "TABLE":
          renderDocumentTable(node, container);
          break;
        default:
          renderDocumentChildren(node, container, renderRepairNode, currentContext);
          break;
      }
    }

    // 中文註解：渲染維修流程區塊；輸入 PROCESS，輸出含標題、步驟與提示群組的 section。
    function renderRepairProcess(processNode, container, context) {
      const processBlock = document.createElement("section");
      processBlock.className = "repair-process";
      if (context && context.depth > 0) processBlock.classList.add("repair-process-nested");

      const titleElement = getFirstChildElement(processNode, "TITLE");
      if (titleElement) {
        const processTitle = document.createElement("h2");
        processTitle.textContent = titleElement.textContent.trim();
        processBlock.appendChild(processTitle);
      }

      const stepContext = { depth: context && context.depth ? context.depth + 1 : 1 };
      let stepIndex = 0;
      processNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "TITLE") return;
        if (tag === "STEPS") {
          const stepsWrap = document.createElement("div");
          stepsWrap.className = "repair-steps";
          renderRepairSteps(child, stepsWrap, stepContext, stepIndex);
          processBlock.appendChild(stepsWrap);
          stepIndex += getRepairStepCount(child);
          return;
        }
        if (tag === "HINTS") {
          const hintsWrap = document.createElement("div");
          hintsWrap.className = "repair-hint-group";
          renderDocumentChildren(child, hintsWrap, renderRepairNode, stepContext);
          processBlock.appendChild(hintsWrap);
          return;
        }
        renderRepairNode(child, processBlock, stepContext);
      });

      container.appendChild(processBlock);
    }

    // 中文註解：計算 STEPS 內 OPERATINGSTEP 數量；輸入 STEPS 節點，輸出步驟數。
    function getRepairStepCount(stepsNode) {
      let count = 0;
      stepsNode.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === "OPERATINGSTEP") count += 1;
      });
      return count;
    }

    // 中文註解：渲染 STEPS 節點；輸入起始序號，輸出有序的維修步驟內容。
    function renderRepairSteps(stepsNode, container, context, startIndex) {
      let stepIndex = startIndex || 0;
      stepsNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "OPERATINGSTEP") {
          stepIndex += 1;
          renderRepairStep(child, container, { depth: context.depth, stepIndex });
          return;
        }
        if (tag === "INCLUDE_PROCESS" || tag === "PROCESS") {
          renderRepairNode(child, container, { depth: context.depth + 1 });
          return;
        }
        renderRepairNode(child, container, context);
      });
    }

    // 中文註解：渲染單一維修步驟；輸入 OPERATINGSTEP 與序號上下文，輸出 step section。
    function renderRepairStep(stepNode, container, context) {
      const stepDiv = document.createElement("section");
      stepDiv.className = "repair-step";
      const stepTitle = document.createElement("div");
      stepTitle.className = "repair-step-title";
      const stepText = document.createElement("span");
      stepText.textContent = `步驟 ${context.stepIndex || 0} : `;
      stepTitle.appendChild(stepText);
      stepDiv.appendChild(stepTitle);
      stepNode.childNodes.forEach((child) => renderRepairNode(child, stepDiv, context));
      container.appendChild(stepDiv);
    }

    // 中文註解：渲染 WARNING/DAMAGE/HINT；輸入提示節點，輸出帶左側色條的提示區塊。
    // 中文註解：渲染提示內文；輸入 TYPE_OF_DANGER/PROTECTION 等節點，有直接 GRAPHIC 時輸出左側 icon、右側文字，否則維持一般段落。
    // 中文註解：渲染技術性附加資訊；輸入 TECH_INFO 節點，輸出以 GRAPHIC 作為 SIGNALWORD 前置 icon 的資訊區塊。
    function renderRepairTechInfoBlock(techInfoNode, container, context) {
      const block = document.createElement("div");
      block.className = "repair-tech-info-block";

      const signalWord = getFirstChildText(techInfoNode, "SIGNALWORD");
      const graphicNodes = findDirectChildElementsByLocalTag(techInfoNode, "GRAPHIC");
      if (signalWord || graphicNodes.length > 0) {
        const titleRow = document.createElement("div");
        titleRow.className = "repair-tech-info-title-row";
        if (graphicNodes.length > 0) titleRow.appendChild(renderXmlUseGraphic(graphicNodes[0]));
        if (signalWord) {
          const titleText = document.createElement("div");
          titleText.className = "repair-tech-info-title-text";
          titleText.textContent = signalWord;
          titleRow.appendChild(titleText);
        }
        block.appendChild(titleRow);
      }

      const body = document.createElement("div");
      body.className = "repair-tech-info-body";
      techInfoNode.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && ["GRAPHIC", "SIGNALWORD"].includes(getLocalTagName(child))) return;
        renderRepairNode(child, body, context);
      });
      if (body.textContent.trim() || body.children.length > 0) block.appendChild(body);
      container.appendChild(block);
    }
    function renderRepairHintContentBlock(contentNode, container, context) {
      const graphicNodes = findDirectChildElementsByLocalTag(contentNode, "GRAPHIC");
      if (graphicNodes.length === 0) {
        const block = document.createElement("p");
        renderDocumentChildren(contentNode, block, renderRepairNode, context);
        container.appendChild(block);
        return;
      }

      const row = document.createElement("div");
      row.className = "repair-inline-icon-row";
      row.appendChild(renderXmlUseGraphic(graphicNodes[0]));

      const textWrap = document.createElement("div");
      textWrap.className = "repair-inline-icon-text";
      contentNode.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === "GRAPHIC") return;
        renderRepairNode(child, textWrap, context);
      });
      row.appendChild(textWrap);
      container.appendChild(row);
    }
    function renderRepairHint(hintNode, container, context) {
      const hintDiv = document.createElement("div");
      hintDiv.className = "repair-hint";
      const signalWord = getFirstChildText(hintNode, "SIGNALWORD") || getFirstChildText(hintNode, "TITLE");
      const tag = getLocalTagName(hintNode);
      if (tag === "DAMAGE" || /警告|危險|危险|注意|損壞|损坏/i.test(signalWord)) hintDiv.classList.add("attention");
      if (signalWord) {
        const graphicNodes = findDirectChildElementsByLocalTag(hintNode, "GRAPHIC");
        if (graphicNodes.length > 0) {
          const signalRow = document.createElement("div");
          signalRow.className = "repair-inline-icon-row repair-signal-row";
          signalRow.appendChild(renderXmlUseGraphic(graphicNodes[0]));
          const signalText = document.createElement("div");
          signalText.className = "repair-inline-icon-text";
          const signalParagraph = document.createElement("p");
          signalParagraph.textContent = signalWord;
          signalText.appendChild(signalParagraph);
          signalRow.appendChild(signalText);
          hintDiv.appendChild(signalRow);
        } else {
          const titleElement = document.createElement("div");
          titleElement.className = "repair-hint-title";
          titleElement.textContent = signalWord;
          hintDiv.appendChild(titleElement);
        }
      }
      hintNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const childTag = getLocalTagName(child);
        if (childTag === "SIGNALWORD" || childTag === "GRAPHIC" || childTag === "TITLE") return;
        renderRepairNode(child, hintDiv, context);
      });
      container.appendChild(hintDiv);
    }

    // 中文註解：渲染 HOTSPOT；輸入 HOTSPOT 節點，輸出保留 LINKID title 的 inline span。
    // 中文註解：渲染右側文件清單；輸入 DOCUMENTLIST，輸出 div 清單，讓 HOTSPOT 項目自動換行而不是 inline span。
    function renderRepairDocumentList(documentListNode) {
      const list = document.createElement("div");
      list.className = "repair-document-list";
      const hotspotNodes = findDescendantElementsByLocalTags(documentListNode, ["HOTSPOT"]);
      hotspotNodes.forEach((hotspotNode) => {
        const item = document.createElement("div");
        item.className = "repair-document-link";
        const awNumber = getFirstChildText(hotspotNode, "AWNUMBER");
        const title = getFirstChildText(hotspotNode, "TITLE");
        item.textContent = [awNumber, title].filter(Boolean).join(" ") || hotspotNode.textContent.trim();
        const linkId = hotspotNode.getAttribute("LINKID") || "";
        if (linkId) item.setAttribute("title", `HOTSPOT: ${linkId}`);
        list.appendChild(item);
      });
      if (list.children.length === 0) list.textContent = documentListNode.textContent.trim();
      return list;
    }
    function renderHotspot(node) {
      const span = document.createElement("span");
      span.className = "hotspot";
      span.textContent = node.textContent.trim();
      const linkId = node.getAttribute("LINKID") || "";
      if (linkId) span.setAttribute("title", `HOTSPOT: ${linkId}`);
      return span;
    }

    // 中文註解：取得不含 namespace 前綴的 tag name；輸入 XML 節點，輸出大寫 local tag name。
    function getLocalTagName(node) {
      if (!node || node.nodeType !== Node.ELEMENT_NODE) return "";
      const localName = node.localName || node.tagName || "";
      return localName.split(":").pop().toUpperCase();
    }

    // 中文註解：深度尋找第一個指定 local tag；輸入根節點與 tag，輸出第一個符合的 Element。
    function findFirstElementByLocalTag(node, targetTagName) {
      if (!node) return null;
      const target = String(targetTagName || "").toUpperCase();
      if (node.nodeType === Node.ELEMENT_NODE && getLocalTagName(node) === target) return node;
      for (const child of node.childNodes) {
        if (child.nodeType !== Node.ELEMENT_NODE) continue;
        const found = findFirstElementByLocalTag(child, target);
        if (found) return found;
      }
      return null;
    }

    // 中文註解：尋找直接子層指定 local tag；輸入父節點與 tag，輸出第一個直接子元素。
    function getFirstChildElement(parentNode, childTagName) {
      if (!parentNode) return null;
      const target = String(childTagName || "").toUpperCase();
      for (const child of parentNode.childNodes) {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === target) return child;
      }
      return null;
    }

    // 中文註解：取得直接子層指定 local tag 的文字；輸入父節點與 tag，輸出 trim 後文字。
    function getFirstChildText(parentNode, childTagName) {
      const child = getFirstChildElement(parentNode, childTagName);
      return child ? child.textContent.trim() : "";
    }

    // 中文註解：依序轉換所有子節點；可指定 renderer 與上下文，讓一般文件和維修文件共用流程。
    function renderDocumentChildren(node, container, renderer, context) {
      const renderFunction = typeof renderer === "function" ? renderer : renderDocumentNode;
      node.childNodes.forEach((child) => renderFunction(child, container, context));
    }

    // 中文註解：轉換 XML 清單節點；輸入 LIST/GENERALLIST，輸出 ul 節點。
    function renderDocumentList(listNode) {
      const list = document.createElement("ul");
      list.className = "xml-list";
      const listType = (listNode.getAttribute("TYPE") || "").toUpperCase();
      listNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "LISTENTRY" || tag === "LISTELEMENT") list.appendChild(renderDocumentListItem(child, listType));
      });
      return list;
    }

    // 中文註解：轉換 XML 清單項目；保留 LABEL 作為左側標號，沒有標號時依清單型態補預設符號。
    function renderDocumentListItem(itemNode, listType) {
      const item = document.createElement("li");
      item.className = "xml-list-item";
      const labelElement = document.createElement("span");
      labelElement.className = "xml-list-label";
      const bodyElement = document.createElement("div");
      bodyElement.className = "xml-list-body";
      let hasLabel = false;
      let hasBody = false;
      itemNode.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "LABEL") {
          labelElement.textContent = child.textContent.trim();
          hasLabel = !!labelElement.textContent;
          return;
        }
        if (tag === "PARAGRAPH") {
          const paragraph = document.createElement("p");
          renderDocumentChildren(child, paragraph);
          bodyElement.appendChild(paragraph);
          hasBody = true;
          return;
        }
        renderDocumentNode(child, bodyElement);
        hasBody = true;
      });
      if (!hasLabel) labelElement.textContent = listType === "DASH" ? "–" : "•";
      if (!hasBody) bodyElement.textContent = itemNode.textContent.trim();
      item.appendChild(labelElement);
      item.appendChild(bodyElement);
      return item;
    }

    // 中文註解：轉換 XML 表格；讀取 COLSPEC 欄寬、THEAD/TBODY 與 ROW/ENTRY，輸出 viewer-style 表格。
    function renderDocumentTable(tableNode, container) {
      const table = document.createElement("table");
      let tableGroup = null;
      let hasTableHead = false;
      let firstBodyRow = null;
      tableNode.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === "TGROUP") tableGroup = child;
      });
      if (!tableGroup) {
        container.appendChild(table);
        return;
      }
      const colspecs = [];
      tableGroup.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === "COLSPEC") colspecs.push(child);
      });
      const widths = [];
      let totalWidth = 0;
      colspecs.forEach((colspec) => {
        const width = parseFloat(colspec.getAttribute("COLWIDTH") || "0") || 0;
        widths.push(width);
        totalWidth += width;
      });
      if (totalWidth > 0 && widths.length > 0) {
        const colgroup = document.createElement("colgroup");
        widths.forEach((width) => {
          const col = document.createElement("col");
          col.style.width = `${((width / totalWidth) * 100).toFixed(2)}%`;
          colgroup.appendChild(col);
        });
        table.appendChild(colgroup);
      }
      tableGroup.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "THEAD") {
          hasTableHead = true;
          const thead = document.createElement("thead");
          renderDocumentTableSection(child, thead, "th", true);
          table.appendChild(thead);
          return;
        }
        if (tag === "TBODY") {
          const tbody = document.createElement("tbody");
          firstBodyRow = renderDocumentTableSection(child, tbody, "td", false) || firstBodyRow;
          table.appendChild(tbody);
        }
      });
      if (!hasTableHead && firstBodyRow) firstBodyRow.classList.add("highlight-row");
      container.appendChild(table);
    }

    // 中文註解：轉換 THEAD/TBODY 內的 ROW/ENTRY；支援 MOREROWS 合併列，輸出第一列供表格樣式使用。
    function renderDocumentTableSection(sectionNode, sectionElement, cellTag, highlightAllRows) {
      let firstRenderedRow = null;
      sectionNode.childNodes.forEach((rowNode) => {
        if (rowNode.nodeType !== Node.ELEMENT_NODE || getLocalTagName(rowNode) !== "ROW") return;
        const row = document.createElement("tr");
        if (!firstRenderedRow) firstRenderedRow = row;
        if (highlightAllRows) row.classList.add("highlight-row");
        rowNode.childNodes.forEach((entry) => {
          if (entry.nodeType !== Node.ELEMENT_NODE || getLocalTagName(entry) !== "ENTRY") return;
          const cell = document.createElement(cellTag);
          const moreRows = parseInt(entry.getAttribute("MOREROWS") || "0", 10);
          if (moreRows > 0) cell.rowSpan = moreRows + 1;
          renderDocumentChildren(entry, cell);
          row.appendChild(cell);
        });
        sectionElement.appendChild(row);
      });
      return firstRenderedRow;
    }

    // 中文註解：產生 HTML 顯示用的空狀態節點；輸入是提示文字，輸出是可插入文件預覽的 div。
    function createDocumentEmptyMessage(message) {
      const panel = document.createElement("div");
      panel.className = "placeholder";
      panel.textContent = message;
      return panel;
    }    // 中文註解：產生圖片查看按鈕，按鈕會記錄列索引，點擊時再取回對應資料與圖片檔。
    function renderPictureButton(rowIndex, hasImage) {
      const disabledText = hasImage ? "" : " disabled";
      const titleText = hasImage ? "查看圖片" : "找不到對應圖片";
      return `<td class="image-column"><button class="image-button" type="button" data-row-index="${rowIndex}" title="${titleText}"${disabledText}>圖</button></td>`;
    }

    // 中文註解：依目前 tab 的資料產生表格；若沒有資料，顯示空狀態而不是空白畫面。
    function renderActiveTable() {
      const currentRows = appState.filteredData[appState.activeTab] || [];
      const currentColumns = tableColumns[appState.activeTab] || [];

      if (!appState.rawData) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "尚未載入資料。");
        return;
      }

      if (currentRows.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, `${appState.activeTab} 沒有可顯示的資料。`);
        return;
      }

      const isPictureTab = appState.activeTab === "PictureList_site" || appState.activeTab === "PictureList_pin";
      const imageHeader = isPictureTab ? '<th class="image-column">圖片</th>' : "";
      const tableHead = imageHeader + currentColumns.map((columnName) => `<th>${escapeHtml(columnName)}</th>`).join("");
      const tableBody = currentRows.map((rowItem, rowIndex) => {
        const imageCell = isPictureTab ? renderPictureButton(rowIndex, hasPictureFile(appState.activeTab, rowItem)) : "";
        const cells = currentColumns.map((columnName) => `<td>${escapeTraditionalHtml(rowItem[columnName])}</td>`).join("");
        return `<tr>${imageCell}${cells}</tr>`;
      }).join("");

      tableContainer.className = "table-wrap";
      tableContainer.innerHTML = `
        <table>
          <thead><tr>${tableHead}</tr></thead>
          <tbody>${tableBody}</tbody>
        </table>
      `;
    }



    // 中文註解：渲染第四個 Site 對應圖 tab，左側顯示 site 圖，右側顯示原始 Name_CN 與 pin 圖入口。
    function renderCompareTab() {
      if (!appState.rawData) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "尚未載入資料。");
        return;
      }

      const siteItems = appState.filteredData.PictureList_site;
      if (siteItems.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "PictureList_site 沒有可顯示的資料。");
        return;
      }

      if (appState.selectedSiteIndex >= siteItems.length) appState.selectedSiteIndex = 0;
      const selectedSiteItem = siteItems[appState.selectedSiteIndex];
      const selectedNames = getNameList(selectedSiteItem);
      const selectedSiteFileId = String(selectedSiteItem && selectedSiteItem.FileID ? selectedSiteItem.FileID : "未提供").trim() || "未提供";
      const sitePath = getPictureRelativePath("PictureList_site", selectedSiteItem);
      const siteFile = appState.imageFileMap.get(sitePath);
      const siteImageHtml = siteFile
        ? `<img src="${URL.createObjectURL(siteFile)}" alt="${escapeHtml(sitePath)}">`
        : `<div class="empty-state">找不到 Site 圖片：${escapeHtml(sitePath)}</div>`;
      const optionsHtml = siteItems.map((siteItem, index) => {
        const label = resolveComponentNames(siteItem);
        const selectedText = index === appState.selectedSiteIndex ? " selected" : "";
        return `<option value="${index}"${selectedText}>${escapeTraditionalHtml(label)}</option>`;
      }).join("");
      const nameListHtml = selectedNames.map((nameText) => {
        const pinItem = findPinItemByName(nameText);
        const pinPath = pinItem ? getPinPictureRelativePath(pinItem) : "";
        const hasPinImage = pinPath ? appState.imageFileMap.has(pinPath) : false;
        const pinDisplayName = `${selectedComponent.displayName}（${plugName}）`;
        const buttonHtml = pinItem
          ? `<button class="pin-button" type="button" data-pin-file-id="${escapeHtml(pinItem.FileID)}" data-pin-display-name="${escapeHtml(pinDisplayName)}" title="查看 Pin 圖"${disabledAttribute}>圖</button>`
          : "";
        return `<li class="raw-name-item"><span class="raw-name-text">${escapeTraditionalHtml(pinDisplayName)}</span>${buttonHtml}</li>`;
      }).join("");

      tableContainer.className = "compare-layout";
      tableContainer.innerHTML = `
        <section class="compare-left">
          <div class="site-toolbar">
            <label for="siteCompareSelect">PictureList_site 對應中文名稱</label>
            <select id="siteCompareSelect" class="site-select">${optionsHtml}</select>
          </div>
          <div class="site-image-wrap">
            <div class="site-file-id">FileID：${escapeHtml(selectedSiteFileId)}</div>
            <div class="site-image-body">${siteImageHtml}</div>
          </div>
        </section>
        <section class="compare-right">
          <p class="pin-list-title">Name_CN 原始值</p>
          <ul class="raw-name-list">${nameListHtml || '<li class="raw-name-item"><span class="raw-name-text">沒有 Name_CN 資料</span></li>'}</ul>
        </section>
        <aside id="pinDrawer" class="pin-drawer" aria-label="Pin 圖片預覽">
          <div class="pin-drawer-header">
            <p id="pinDrawerTitle" class="pin-drawer-title">Pin 圖片</p>
            <button id="pinDrawerClose" class="drawer-close" type="button" aria-label="關閉">×</button>
          </div>
          <div id="pinDrawerBody" class="pin-drawer-body"></div>
        </aside>
      `;
    }

    // 中文註解：渲染固定顯示的元件對應圖內容，左側為可搜尋元件列表與 Site 圖，右側為該元件 plugList。
    function renderComponentCompareTab() {
      if (!appState.rawData) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "尚未載入資料。");
        return;
      }

      const allComponentItems = getComponentCompareItems();
      if (allComponentItems.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "沒有可對應 PictureList_site 的元件資料，或尚未載入名稱 JSON。");
        return;
      }

      const componentItems = getVisibleComponentItems();

      if (componentItems.length === 0) {
        tableContainer.className = "compare-layout";
        tableContainer.innerHTML = `
          <section class="compare-left component-left">
            <div class="component-main">
              <div class="component-list-panel">
                ${renderComponentSearchControlsHtml()}

                <ul class="component-list"><li class="raw-name-item"><span class="raw-name-text">沒有符合的元件</span></li></ul>
              </div>
              <div class="component-image-panel"><div class="empty-state">請調整搜尋條件。</div></div>
            </div>
          </section>
          <section class="compare-right component-compare-right">
            <div class="component-right-section">
              <p class="pin-list-title">插頭圖清單</p>
              <ul class="raw-name-list"><li class="raw-name-item"><span class="raw-name-text">沒有插頭圖清單資料</span></li></ul>
            </div>
            <div class="component-right-section">
              <p class="pin-list-title">相關文件</p>
              <div class="index-tree"><div class="empty-state">請先選擇左側元件。</div></div>
            </div>
          </section>
        `;
        return;
      }

      const originalIndexByDisplayName = new Map(allComponentItems.map((componentItem, index) => [componentItem.displayName, index]));
      const selectedKey = allComponentItems[appState.selectedComponentIndex] ? allComponentItems[appState.selectedComponentIndex].displayName : "";
      let selectedFilteredIndex = componentItems.findIndex((componentItem) => componentItem.displayName === selectedKey);
      if (selectedFilteredIndex < 0) {
        selectedFilteredIndex = 0;
        appState.selectedComponentIndex = allComponentItems.findIndex((componentItem) => componentItem.displayName === componentItems[0].displayName);
      }

      const selectedComponent = componentItems[selectedFilteredIndex];
      const sitePath = getPictureRelativePath("PictureList_site", selectedComponent.siteItem);
      const siteFile = appState.imageFileMap.get(sitePath);
      const convertedSitePath = getConvertedSitePictureRelativePath(selectedComponent.siteItem);
      const convertedSiteJsonPath = getConvertedSiteJsonRelativePath(selectedComponent.siteItem);
      const selectedSiteFileId = String(selectedComponent.siteItem && selectedComponent.siteItem.FileID ? selectedComponent.siteItem.FileID : "未提供").trim() || "未提供";
      // 中文註解：第五分頁中間位置圖標題需與左側選單名稱一致，並固定補上「位置圖」方便辨識目前圖片用途。
      const selectedSiteTitle = `${selectedComponent.displayName} 位置圖`;
      const siteImageHtml = siteFile
        ? `<img src="${URL.createObjectURL(siteFile)}" alt="${escapeHtml(sitePath)}">`
        : `<div class="empty-state">找不到 Site 圖片：${escapeHtml(sitePath)}</div>`;
      const componentListHtml = componentItems.map((componentItem) => {
        const originalIndex = originalIndexByDisplayName.get(componentItem.displayName);
        const activeClass = componentItem.displayName === selectedComponent.displayName ? " active" : "";
        return `<li><button class="component-list-item${activeClass}" type="button" data-component-index="${originalIndex}">${escapeTraditionalHtml(componentItem.displayName)}</button></li>`;
      }).join("");
      const matchedPlugList = selectedComponent.plugList.filter(hasMatchingSiteNameForPlug);
      const plugListHtml = matchedPlugList.map((plugName) => {
        const pinItem = findPinItemByName(plugName);
        const pinPath = pinItem ? getPinPictureRelativePath(pinItem) : "";
        const hasPinImage = pinPath ? appState.imageFileMap.has(pinPath) : false;
        const disabledAttribute = hasPinImage ? "" : " disabled";
        const pinDisplayName = `${selectedComponent.displayName}（${plugName}）`;
        const buttonHtml = pinItem
          ? `<button class="pin-button" type="button" data-pin-file-id="${escapeHtml(pinItem.FileID)}" data-pin-display-name="${escapeHtml(pinDisplayName)}" data-plug-name="${escapeHtml(plugName)}" title="查看 Pin 圖"${disabledAttribute}>圖</button>`
          : "";
        return `<li class="raw-name-item component-pin-item" data-plug-name="${escapeHtml(plugName)}" data-pin-file-id="${escapeHtml(pinItem ? pinItem.FileID : "")}" data-pin-display-name="${escapeHtml(pinDisplayName)}"><span class="raw-name-text">${escapeTraditionalHtml(pinDisplayName)}</span>${buttonHtml}</li>`;
      }).join("");

      tableContainer.className = "compare-layout";
      tableContainer.innerHTML = `
        <section class="compare-left component-left">
          <div class="component-main">
            <div class="component-list-panel">
              ${renderComponentSearchControlsHtml()}

              <ul class="component-list">${componentListHtml}</ul>
            </div>
            <div class="component-image-panel">
              <div class="component-image-stack">
                <div class="component-title-section">
                  <div class="component-site-title">${escapeTraditionalHtml(selectedSiteTitle)}</div>
                  <div class="site-file-id">FileID：${escapeHtml(selectedSiteFileId)}</div>
                </div>
                <!-- 中文註解：原始檔區沿用目前 PictureList_site 圖片解析結果，左側固定垂直標籤方便與轉換後區塊對照。 -->
                <div class="component-image-section">
                  <div class="component-image-side-label">原始檔</div>
                  <div class="component-image-section-body">
                    <div class="site-image-wrap"><div class="site-image-body">${siteImageHtml}</div></div>
                  </div>
                </div>
                <!-- 中文註解：轉換後區塊使用 canvas 疊合 restyler 圖與 JSON 標註，讓符合右側插頭清單的 OCR 與箭頭顯示在圖上。 -->
                <div class="component-image-section">
                  <div class="component-image-side-label">轉換後</div>
                  <div class="component-image-section-body">
                    <div class="converted-canvas-wrap">
                      <canvas class="converted-site-canvas" aria-label="轉換後位置圖標註"></canvas>
                      <div class="converted-canvas-status">轉換後圖片載入中...</div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
        <section class="compare-right component-compare-right">
          <div class="component-right-section">
            <p class="pin-list-title">${escapeTraditionalHtml(selectedComponent.displayName)} 插頭圖清單</p>
            <ul class="raw-name-list">${plugListHtml || '<li class="raw-name-item"><span class="raw-name-text">沒有插頭圖清單資料</span></li>'}</ul>
          </div>
          <div class="component-right-section">
            <p class="pin-list-title">${escapeTraditionalHtml(selectedComponent.name)} 相關文件</p>
            <div class="index-tree">${renderIndexTreeHtml(selectedComponent.name)}</div>
          </div>
        </section>
        <aside id="pinDrawer" class="pin-drawer" aria-label="Pin 圖片預覽">
          <div class="pin-drawer-header">
            <p id="pinDrawerTitle" class="pin-drawer-title">Pin 圖片</p>
            <button id="pinDrawerClose" class="drawer-close" type="button" aria-label="關閉">×</button>
          </div>
          <div id="pinDrawerBody" class="pin-drawer-body"></div>
        </aside>
      `;

      const componentList = tableContainer.querySelector(".component-list");
      if (componentList) componentList.scrollTop = appState.componentListScrollTop;
      renderConvertedSiteCanvas(tableContainer.querySelector(".converted-canvas-wrap"), convertedSitePath, convertedSiteJsonPath, matchedPlugList);
    }
    // 中文註解：目前畫面已固定為最後一個「元件對應圖」內容；保留統一入口，讓載入 JSON、名稱 JSON、索引 JSON 後都能刷新同一個畫面。
    function renderActiveView() {
      const contentPanel = document.getElementById("content");
      if (contentPanel) contentPanel.classList.add("compare-content");
      renderComponentCompareTab();
    }

    // 中文註解：更新檔案載入摘要，讓使用者知道各清單過濾與去重後剩下多少筆資料。
    function renderSummary(fileName) {
      const projectCount = appState.filteredData.ProjectList.length;
      const siteCount = appState.filteredData.PictureList_site.length;
      const pinCount = appState.filteredData.PictureList_pin.length;
      const imageCount = appState.imageFileMap.size;
      const jsonCount = appState.jsonFiles.length;
      const compeName = appState.currentCompeFile ? getFolderRelativePath(appState.currentCompeFile) : "未載入名稱 JSON";
      const indexName = appState.currentIndexJsonFile ? getFolderRelativePath(appState.currentIndexJsonFile) : "未載入索引 JSON";
      summaryElement.textContent = `已載入 ${fileName}：ProjectList ${projectCount} 筆，PictureList_site ${siteCount} 筆，PictureList_pin ${pinCount} 筆，圖片索引 ${imageCount} 個，JSON ${jsonCount} 個，名稱對應：${compeName}，索引：${indexName}。`;
      summaryElement.classList.remove("error");
    }


    // 中文註解：釋放前一次預覽圖片建立的暫存網址，避免長時間使用後佔用記憶體。
    function revokeCurrentImageUrl() {
      if (appState.currentImageUrl) {
        URL.revokeObjectURL(appState.currentImageUrl);
        appState.currentImageUrl = "";
      }
    }



    // 中文註解：釋放右側滑出 pin 圖片網址；輸入／輸出走 appState，會一次清掉原始圖與轉換後圖的暫存網址。
    function revokeCurrentPinDrawerUrl() {
      appState.currentPinDrawerUrls.forEach((imageUrl) => URL.revokeObjectURL(imageUrl));
      appState.currentPinDrawerUrls = [];
    }

    // 中文註解：開啟圖片 dialog；輸入為目前列資料，輸出為使用者可檢視的圖片預覽。
    function openImageDialog(rowItem) {
      const picturePath = getPictureRelativePath(appState.activeTab, rowItem);
      const imageFile = appState.imageFileMap.get(picturePath);

      revokeCurrentImageUrl();
      dialogTitle.textContent = `圖片預覽：${picturePath || "無檔案路徑"}`;

      if (!imageFile) {
        dialogBody.innerHTML = `<div class="empty-state">找不到對應圖片：${escapeHtml(picturePath || "FileID 空白")}</div>`;
        imageDialog.showModal();
        return;
      }

      appState.currentImageUrl = URL.createObjectURL(imageFile);
      dialogBody.innerHTML = `<img src="${appState.currentImageUrl}" alt="${escapeHtml(picturePath)}">`;
      imageDialog.showModal();
    }



    // 中文註解：建立 Pin 抽屜中的單張圖片區塊；輸入為標題、路徑與 File，輸出為原始檔或轉換後圖片 HTML。
    function renderPinDrawerImageSection(headingText, picturePath, imageFile) {
      if (!imageFile) {
        return `
          <section class="pin-image-section">
            <p class="pin-image-heading">${escapeHtml(headingText)}</p>
            <div class="pin-image-content"><div class="empty-state">找不到 Pin 圖片：${escapeHtml(picturePath || "FileID 空白")}</div></div>
          </section>
        `;
      }

      const imageUrl = URL.createObjectURL(imageFile);
      appState.currentPinDrawerUrls.push(imageUrl);
      return `
        <section class="pin-image-section">
          <p class="pin-image-heading">${escapeHtml(headingText)}</p>
          <div class="pin-image-content"><img src="${imageUrl}" alt="${escapeHtml(picturePath)}"></div>
        </section>
      `;
    }

    // 中文註解：開啟元件對應圖的右側滑出 pin 圖片面板；輸入為 pin 資料列與清單顯示名稱，輸出為上下排列的原始檔與轉換後 Pin 圖。
    function openPinDrawer(pinItem, pinDisplayName) {
      const pinDrawer = document.getElementById("pinDrawer");
      const pinDrawerTitle = document.getElementById("pinDrawerTitle");
      const pinDrawerBody = document.getElementById("pinDrawerBody");
      if (!pinDrawer || !pinDrawerTitle || !pinDrawerBody) return;

      const pinPath = getPinPictureRelativePath(pinItem);
      const convertedPinPath = getConvertedPinPictureRelativePath(pinItem);
      const pinFile = appState.imageFileMap.get(pinPath);
      const convertedPinFile = appState.imageFileMap.get(convertedPinPath.toLowerCase());
      revokeCurrentPinDrawerUrl();
      pinDrawerTitle.innerHTML = `<span class="pin-drawer-title-name">${escapeTraditionalHtml(pinDisplayName || "Pin 圖片")}</span><span class="pin-drawer-title-path">${escapeHtml(pinPath || "無檔案路徑")}</span>`;
      pinDrawerBody.innerHTML = [
        renderPinDrawerImageSection("原始檔", pinPath, pinFile),
        renderPinDrawerImageSection("轉換後", convertedPinPath, convertedPinFile),
      ].join("");
      pinDrawer.classList.add("open");
    }

    // 中文註解：關閉元件對應圖的右側滑出面板並釋放圖片網址；箭頭提示需保留到使用者再次點選清單才清除。
    function closePinDrawer() {
      const pinDrawer = document.getElementById("pinDrawer");
      if (pinDrawer) pinDrawer.classList.remove("open");
      revokeCurrentPinDrawerUrl();
    }

    // 中文註解：處理表格內圖片按鈕點擊，透過列索引找到目前 tab 的原始資料。
    function handleTableClick(event) {
      const imageButton = event.target.closest(".image-button");
      if (imageButton && !imageButton.disabled) {
        const rowIndex = Number(imageButton.dataset.rowIndex);
        const currentRows = appState.filteredData[appState.activeTab] || [];
        const rowItem = currentRows[rowIndex];
        if (rowItem) openImageDialog(rowItem);
        return;
      }

      const filterToggle = event.target.closest("#componentFilterToggle");
      if (filterToggle) {
        const componentList = tableContainer.querySelector(".component-list");
        appState.componentListScrollTop = componentList ? componentList.scrollTop : 0;
        appState.componentRequirePlugImageAndDocument = !appState.componentRequirePlugImageAndDocument;
        closePinDrawer();
        renderComponentCompareTab();
        return;
      }

      const componentButton = event.target.closest(".component-list-item");
      if (componentButton) {
        const componentList = tableContainer.querySelector(".component-list");
        appState.componentListScrollTop = componentList ? componentList.scrollTop : 0;
        appState.selectedComponentIndex = Number(componentButton.dataset.componentIndex);
        closePinDrawer();
        renderComponentCompareTab();
        return;
      }

      const pinButton = event.target.closest(".pin-button");
      if (pinButton && !pinButton.disabled) {
        const pinItem = appState.filteredData.PictureList_pin.find((item) => String(item.FileID) === String(pinButton.dataset.pinFileId));
        if (pinItem) {
          openPinDrawer(pinItem, pinButton.dataset.pinDisplayName || "");
          toggleConvertedSiteArrowForPlug(pinButton.dataset.plugName || "", `${pinButton.dataset.pinFileId || ""}|${pinButton.dataset.plugName || ""}`);
        }
        return;
      }

      const componentPinItem = event.target.closest(".component-pin-item");
      if (componentPinItem) {
        toggleConvertedSiteArrowForPlug(componentPinItem.dataset.plugName || "", `${componentPinItem.dataset.pinFileId || ""}|${componentPinItem.dataset.plugName || ""}`);
        return;
      }

      const indexDocumentButton = event.target.closest(".index-leaf-button");
      if (indexDocumentButton) {
        openIndexDocumentWindow({
          documentType: indexDocumentButton.dataset.documentType || "",
          parentName: indexDocumentButton.dataset.parentName || "",
          nameCn: indexDocumentButton.dataset.nameCn || "",
          xmlNb: indexDocumentButton.dataset.xmlNb || "",
          factFileName: indexDocumentButton.dataset.factFileName || "",
        });
        return;
      }

      if (event.target.closest("#pinDrawerClose")) {
        closePinDrawer();
      }
    }

    // 中文註解：排程第 5 分頁左側關鍵字搜尋重繪；輸入為游標位置與延遲時間，輸出是更新後畫面並還原搜尋框焦點。
    function scheduleComponentSearchRender(cursorStart, cursorEnd, delayMs = 120) {
      if (appState.componentSearchTimer) {
        clearTimeout(appState.componentSearchTimer);
      }

      appState.componentSearchTimer = setTimeout(() => {
        appState.componentSearchTimer = null;
        renderComponentCompareTab();
        requestAnimationFrame(() => {
          const searchInput = document.getElementById("componentSearchInput");
          if (!searchInput) return;
          searchInput.focus();
          if (typeof cursorStart === "number" && typeof cursorEnd === "number") {
            searchInput.setSelectionRange(cursorStart, cursorEnd);
          }
        });
      }, delayMs);
    }

    // 中文註解：同步搜尋框文字到狀態；輸入是搜尋框元素，輸出是 appState 的搜尋字與清單捲動位置更新。
    function updateComponentSearchKeyword(searchInput) {
      appState.componentSearchKeyword = searchInput.value;
      appState.componentListScrollTop = 0;
      closePinDrawer();
    }

    // 中文註解：處理第 5 分頁左側關鍵字搜尋；中文輸入法組字期間只同步文字，不重繪 DOM，避免候選字與游標被打斷。
    function handleTableInput(event) {
      if (event.target.id === "componentSearchInput") {
        updateComponentSearchKeyword(event.target);
        if (appState.componentSearchComposing || event.isComposing) return;
        scheduleComponentSearchRender(event.target.selectionStart, event.target.selectionEnd);
      }
    }

    // 中文註解：標記搜尋框正在進行 IME 組字；輸入為 compositionstart 事件，輸出是暫停即時重繪的狀態。
    function handleTableCompositionStart(event) {
      if (event.target.id !== "componentSearchInput") return;
      appState.componentSearchComposing = true;
      if (appState.componentSearchTimer) {
        clearTimeout(appState.componentSearchTimer);
        appState.componentSearchTimer = null;
      }
    }

    // 中文註解：處理 IME 組字完成後的搜尋更新；輸入為 compositionend 事件，輸出是保留即時搜尋的下一次安全重繪。
    function handleTableCompositionEnd(event) {
      if (event.target.id !== "componentSearchInput") return;
      appState.componentSearchComposing = false;
      updateComponentSearchKeyword(event.target);
      scheduleComponentSearchRender(event.target.selectionStart, event.target.selectionEnd, 0);
    }
    // 中文註解：處理第四個 tab 的 Site 選單切換，更新左側圖片與右側 Name_CN 清單。
    function handleTableChange(event) {
      if (event.target.id === "siteCompareSelect") {
        appState.selectedSiteIndex = Number(event.target.value);
        closePinDrawer();
        renderCompareTab();
      }
    }

    // 中文註解：更新 JSON 下拉選單；多個 JSON 時讓使用者可切換，單一 JSON 時仍保留目前自動載入流程。
    function renderJsonSelect() {
      jsonSelect.innerHTML = appState.jsonFiles.map((file, index) => {
        const relativePath = getFolderRelativePath(file);
        const label = isLikelyMainJson(file) ? relativePath : `${relativePath}（輔助）`;
        return `<option value="${index}">${escapeTraditionalHtml(label)}</option>`;
      }).join("");

      jsonPicker.classList.toggle("hidden", appState.jsonFiles.length <= 1);
    }



    // 中文註解：更新名稱 JSON 下拉選單；多個 _compe_plugs.json 時讓使用者可切換來源。
    function renderCompeSelect() {
      compeSelect.innerHTML = appState.compeFiles.map((file, index) => `<option value="${index}">${escapeTraditionalHtml(getFolderRelativePath(file))}</option>`).join("");
      compePicker.classList.toggle("hidden", appState.compeFiles.length <= 1);
    }

    // 中文註解：更新索引 JSON 下拉選單；索引資料供第 5 分頁右下角 explorer-style 樹狀清單使用。
    function renderIndexJsonSelect() {
      indexJsonSelect.innerHTML = appState.indexJsonFiles.map((file, index) => {
        const relativePath = getFolderRelativePath(file);
        const label = isExplorerIndexJsonFile(file) ? relativePath : `${relativePath}（請確認為 explorer 索引格式）`;
        return `<option value="${index}">${escapeTraditionalHtml(label)}</option>`;
      }).join("");
      indexJsonPicker.classList.toggle("hidden", appState.indexJsonFiles.length === 0);
    }

    // 中文註解：讀取 explorer.html 格式索引 JSON；輸入是 File，輸出會更新右下角樹狀清單資料來源。
    function loadIndexJsonFile(indexJsonFile) {
      if (!indexJsonFile) {
        appState.indexData = null;
        appState.currentIndexJsonFile = null;
        invalidateComponentFilterCache();
        renderActiveView();
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          appState.indexData = JSON.parse(reader.result);
          appState.currentIndexJsonFile = indexJsonFile;
        } catch (error) {
          appState.indexData = null;
          appState.currentIndexJsonFile = null;
          summaryElement.textContent = `無法解析索引 JSON ${getFolderRelativePath(indexJsonFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
        if (appState.currentJsonFile) renderSummary(getFolderRelativePath(appState.currentJsonFile));
        invalidateComponentFilterCache();
        renderActiveView();
      };
      reader.readAsText(indexJsonFile, "utf-8");
    }

    // 中文註解：讀取 XML 文件圖片對應 JSON；輸入是 File，輸出會更新 GRAPHIC SRC 到 Picture/XmlUse 檔名的對應表。
    function loadXmlDocumentUseFile(xmlDocumentUseFile) {
      if (!xmlDocumentUseFile) {
        appState.xmlDocumentUseData = {};
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          appState.xmlDocumentUseData = JSON.parse(reader.result);
        } catch (error) {
          appState.xmlDocumentUseData = {};
          summaryElement.textContent = `無法解析 XML 圖片對應 JSON ${getFolderRelativePath(xmlDocumentUseFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
      };
      reader.readAsText(xmlDocumentUseFile, "utf-8");
    }

    // 中文註解：讀取名稱對應 JSON；失敗時保留空物件，第四 tab 會退回顯示原始 key。
    function loadCompeFile(compeFile) {
      if (!compeFile) {
        appState.compeData = {};
        appState.currentCompeFile = null;
        invalidateComponentFilterCache();
        renderActiveView();
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          appState.compeData = JSON.parse(reader.result);
          appState.currentCompeFile = compeFile;
        } catch (error) {
          appState.compeData = {};
          appState.currentCompeFile = null;
          summaryElement.textContent = `無法解析名稱 JSON ${getFolderRelativePath(compeFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
        if (appState.currentJsonFile) renderSummary(getFolderRelativePath(appState.currentJsonFile));
        invalidateComponentFilterCache();
        renderActiveView();
      };
      reader.readAsText(compeFile, "utf-8");
    }

    // 中文註解：讀取指定 JSON 檔，解析成功後更新畫面資料；輸入是 File 物件，輸出是目前表格畫面。
    function loadJsonFile(jsonFile) {
      if (!jsonFile) {
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const parsedData = JSON.parse(reader.result);
          appState.rawData = parsedData;
          appState.currentJsonFile = jsonFile;
          appState.selectedSiteIndex = 0;
          appState.selectedComponentIndex = 0;
          appState.componentSearchKeyword = "";
          appState.componentListScrollTop = 0;
          closePinDrawer();
          appState.filteredData = buildFilteredData(parsedData);
          invalidateComponentFilterCache();
          renderSummary(getFolderRelativePath(jsonFile));
          renderActiveView();
        } catch (error) {
          appState.rawData = null;
          appState.currentJsonFile = null;
          tableContainer.className = "empty-state";
          setTraditionalText(tableContainer, "JSON 格式錯誤，請確認檔案內容。");
          summaryElement.textContent = `無法解析 ${getFolderRelativePath(jsonFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
      };

      reader.readAsText(jsonFile, "utf-8");
    }

    // 中文註解：處理資料夾選取；建立圖片索引與 JSON 清單，並自動載入排序後第一個 JSON。
    function handleFolderChange(event) {
      const selectedFiles = Array.from(event.target.files || []);
      appState.folderFiles = selectedFiles;
      appState.jsonFiles = findJsonFiles(selectedFiles);
      appState.compeFiles = findCompeJsonFiles(selectedFiles);
      appState.indexJsonFiles = findIndexJsonFiles(selectedFiles);
      appState.xmlDocumentUseFiles = findXmlDocumentUseJsonFiles(selectedFiles);
      appState.imageFileMap = buildImageFileMap(selectedFiles);
      appState.xmlUseImageFileMap = buildXmlUseImageFileMap(selectedFiles);
      appState.rawData = null;
      appState.compeData = {};
      appState.indexData = null;
      appState.xmlDocumentUseData = {};
      appState.currentJsonFile = null;
      appState.currentCompeFile = null;
      appState.currentIndexJsonFile = null;
      appState.selectedSiteIndex = 0;
      appState.selectedComponentIndex = 0;
      appState.componentSearchKeyword = "";
      appState.componentListScrollTop = 0;
      appState.filteredData = buildFilteredData({});
      invalidateComponentFilterCache();
      closePinDrawer();
      renderJsonSelect();
      renderCompeSelect();
      renderIndexJsonSelect();
      revokeDocumentImageUrls();

      if (appState.xmlDocumentUseFiles.length > 0) {
        loadXmlDocumentUseFile(appState.xmlDocumentUseFiles[0]);
      }

      if (appState.indexJsonFiles.length > 0) {
        indexJsonSelect.value = "0";
        loadIndexJsonFile(appState.indexJsonFiles[0]);
      }

      if (appState.compeFiles.length > 0) {
        compeSelect.value = "0";
        loadCompeFile(appState.compeFiles[0]);
      }

      if (appState.jsonFiles.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "找不到 JSON 檔案，請選擇 parse_ssp_xml_gui.py 輸出的資料夾。");
        setTraditionalText(summaryElement, "資料夾內沒有可用的 JSON 檔案。");
        summaryElement.classList.add("error");
        return;
      }

      jsonSelect.value = "0";
      loadJsonFile(appState.jsonFiles[0]);
    }

    // 中文註解：處理下拉選單切換 JSON；圖片根目錄仍沿用同一個已選資料夾。
    function handleJsonSelectChange(event) {
      const selectedIndex = Number(event.target.value);
      const selectedJsonFile = appState.jsonFiles[selectedIndex];
      loadJsonFile(selectedJsonFile);
    }



    // 中文註解：處理名稱 JSON 下拉切換；重新解析名稱後刷新第四 tab 標籤。
    function handleCompeSelectChange(event) {
      const selectedIndex = Number(event.target.value);
      loadCompeFile(appState.compeFiles[selectedIndex]);
    }

    // 中文註解：處理索引 JSON 下拉切換；重新解析後刷新第 5 分頁右下角樹狀清單。
    function handleIndexJsonSelectChange(event) {
      const selectedIndex = Number(event.target.value);
      loadIndexJsonFile(appState.indexJsonFiles[selectedIndex]);
    }

    topToggleButton.addEventListener("click", toggleTopPanel);
    folderInput.addEventListener("change", handleFolderChange);
    jsonSelect.addEventListener("change", handleJsonSelectChange);
    compeSelect.addEventListener("change", handleCompeSelectChange);
    indexJsonSelect.addEventListener("change", handleIndexJsonSelectChange);
    tableContainer.addEventListener("click", handleTableClick);
    tableContainer.addEventListener("change", handleTableChange);
    tableContainer.addEventListener("input", handleTableInput);
    tableContainer.addEventListener("compositionstart", handleTableCompositionStart);
    tableContainer.addEventListener("compositionend", handleTableCompositionEnd);
    dialogCloseButton.addEventListener("click", () => imageDialog.close());
    imageDialog.addEventListener("close", revokeCurrentImageUrl);
    documentDialogCloseButton.addEventListener("click", () => documentDialog.close());
    documentDialog.addEventListener("close", () => {
      revokeDocumentImageUrls();
      documentDialogTitle.textContent = "文件預覽";
      documentDialogBody.innerHTML = "";
    });


  </script>
</body>

</html>
