          labelElement.textContent = child.textContent.trim();
          hasLabel = !!labelElement.textContent;
          return;
        }
        if (tag === "PARAGRAPH") {
          const paragraph = document.createElement("p");
          renderDocumentChildren(child, paragraph);
          bodyElement.appendChild(paragraph);
          hasBody = true;
          return;
        }
        renderDocumentNode(child, bodyElement);
        hasBody = true;
      });
      if (!hasLabel) labelElement.textContent = listType === "DASH" ? "–" : "•";
      if (!hasBody) bodyElement.textContent = itemNode.textContent.trim();
      item.appendChild(labelElement);
      item.appendChild(bodyElement);
      return item;
    }

    // 中文註解：轉換 XML 表格；讀取 COLSPEC 欄寬、THEAD/TBODY 與 ROW/ENTRY，輸出 viewer-style 表格。
    function renderDocumentTable(tableNode, container) {
      const table = document.createElement("table");
      let tableGroup = null;
      let hasTableHead = false;
      let firstBodyRow = null;
      tableNode.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === "TGROUP") tableGroup = child;
      });
      if (!tableGroup) {
        container.appendChild(table);
        return;
      }
      const colspecs = [];
      tableGroup.childNodes.forEach((child) => {
        if (child.nodeType === Node.ELEMENT_NODE && getLocalTagName(child) === "COLSPEC") colspecs.push(child);
      });
      const widths = [];
      let totalWidth = 0;
      colspecs.forEach((colspec) => {
        const width = parseFloat(colspec.getAttribute("COLWIDTH") || "0") || 0;
        widths.push(width);
        totalWidth += width;
      });
      if (totalWidth > 0 && widths.length > 0) {
        const colgroup = document.createElement("colgroup");
        widths.forEach((width) => {
          const col = document.createElement("col");
          col.style.width = `${((width / totalWidth) * 100).toFixed(2)}%`;
          colgroup.appendChild(col);
        });
        table.appendChild(colgroup);
      }
      tableGroup.childNodes.forEach((child) => {
        if (child.nodeType !== Node.ELEMENT_NODE) return;
        const tag = getLocalTagName(child);
        if (tag === "THEAD") {
          hasTableHead = true;
          const thead = document.createElement("thead");
          renderDocumentTableSection(child, thead, "th", true);
          table.appendChild(thead);
          return;
        }
        if (tag === "TBODY") {
          const tbody = document.createElement("tbody");
          firstBodyRow = renderDocumentTableSection(child, tbody, "td", false) || firstBodyRow;
          table.appendChild(tbody);
        }
      });
      if (!hasTableHead && firstBodyRow) firstBodyRow.classList.add("highlight-row");
      container.appendChild(table);
    }

    // 中文註解：轉換 THEAD/TBODY 內的 ROW/ENTRY；支援 MOREROWS 合併列，輸出第一列供表格樣式使用。
    function renderDocumentTableSection(sectionNode, sectionElement, cellTag, highlightAllRows) {
      let firstRenderedRow = null;
      sectionNode.childNodes.forEach((rowNode) => {
        if (rowNode.nodeType !== Node.ELEMENT_NODE || getLocalTagName(rowNode) !== "ROW") return;
        const row = document.createElement("tr");
        if (!firstRenderedRow) firstRenderedRow = row;
        if (highlightAllRows) row.classList.add("highlight-row");
        rowNode.childNodes.forEach((entry) => {
          if (entry.nodeType !== Node.ELEMENT_NODE || getLocalTagName(entry) !== "ENTRY") return;
          const cell = document.createElement(cellTag);
          const moreRows = parseInt(entry.getAttribute("MOREROWS") || "0", 10);
          if (moreRows > 0) cell.rowSpan = moreRows + 1;
          renderDocumentChildren(entry, cell);
          row.appendChild(cell);
        });
        sectionElement.appendChild(row);
      });
      return firstRenderedRow;
    }

    // 中文註解：產生 HTML 顯示用的空狀態節點；輸入是提示文字，輸出是可插入文件預覽的 div。
    function createDocumentEmptyMessage(message) {
      const panel = document.createElement("div");
      panel.className = "placeholder";
      panel.textContent = message;
      return panel;
    }    // 中文註解：產生圖片查看按鈕，按鈕會記錄列索引，點擊時再取回對應資料與圖片檔。
    function renderPictureButton(rowIndex, hasImage) {
      const disabledText = hasImage ? "" : " disabled";
      const titleText = hasImage ? "查看圖片" : "找不到對應圖片";
      return `<td class="image-column"><button class="image-button" type="button" data-row-index="${rowIndex}" title="${titleText}"${disabledText}>圖</button></td>`;
    }

    // 中文註解：依目前 tab 的資料產生表格；若沒有資料，顯示空狀態而不是空白畫面。
    function renderActiveTable() {
      const currentRows = appState.filteredData[appState.activeTab] || [];
      const currentColumns = tableColumns[appState.activeTab] || [];

      if (!appState.rawData) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "尚未載入資料。");
        return;
      }

      if (currentRows.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, `${appState.activeTab} 沒有可顯示的資料。`);
        return;
      }

      const isPictureTab = appState.activeTab === "PictureList_site" || appState.activeTab === "PictureList_pin";
      const imageHeader = isPictureTab ? '<th class="image-column">圖片</th>' : "";
      const tableHead = imageHeader + currentColumns.map((columnName) => `<th>${escapeHtml(columnName)}</th>`).join("");
      const tableBody = currentRows.map((rowItem, rowIndex) => {
        const imageCell = isPictureTab ? renderPictureButton(rowIndex, hasPictureFile(appState.activeTab, rowItem)) : "";
        const cells = currentColumns.map((columnName) => `<td>${escapeTraditionalHtml(rowItem[columnName])}</td>`).join("");
        return `<tr>${imageCell}${cells}</tr>`;
      }).join("");

      tableContainer.className = "table-wrap";
      tableContainer.innerHTML = `
        <table>
          <thead><tr>${tableHead}</tr></thead>
          <tbody>${tableBody}</tbody>
        </table>
      `;
    }



    // 中文註解：渲染第四個 Site 對應圖 tab，左側顯示 site 圖，右側顯示原始 Name_CN 與 pin 圖入口。
    function renderCompareTab() {
      if (!appState.rawData) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "尚未載入資料。");
        return;
      }

      const siteItems = appState.filteredData.PictureList_site;
      if (siteItems.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "PictureList_site 沒有可顯示的資料。");
        return;
      }

      if (appState.selectedSiteIndex >= siteItems.length) appState.selectedSiteIndex = 0;
      const selectedSiteItem = siteItems[appState.selectedSiteIndex];
      const selectedNames = getNameList(selectedSiteItem);
      const selectedSiteFileId = String(selectedSiteItem && selectedSiteItem.FileID ? selectedSiteItem.FileID : "未提供").trim() || "未提供";
      const sitePath = getPictureRelativePath("PictureList_site", selectedSiteItem);
      const siteFile = appState.imageFileMap.get(sitePath);
      const siteImageHtml = siteFile
        ? `<img src="${URL.createObjectURL(siteFile)}" alt="${escapeHtml(sitePath)}">`
        : `<div class="empty-state">找不到 Site 圖片：${escapeHtml(sitePath)}</div>`;
      const optionsHtml = siteItems.map((siteItem, index) => {
        const label = resolveComponentNames(siteItem);
        const selectedText = index === appState.selectedSiteIndex ? " selected" : "";
        return `<option value="${index}"${selectedText}>${escapeTraditionalHtml(label)}</option>`;
      }).join("");
      const nameListHtml = selectedNames.map((nameText) => {
        const pinItem = findPinItemByName(nameText);
        const pinPath = pinItem ? getPinPictureRelativePath(pinItem) : "";
        const hasPinImage = pinPath ? appState.imageFileMap.has(pinPath) : false;
        const pinDisplayName = `${selectedComponent.displayName}（${plugName}）`;
        const buttonHtml = pinItem
          ? `<button class="pin-button" type="button" data-pin-file-id="${escapeHtml(pinItem.FileID)}" data-pin-display-name="${escapeHtml(pinDisplayName)}" title="查看 Pin 圖"${disabledAttribute}>圖</button>`
          : "";
        return `<li class="raw-name-item"><span class="raw-name-text">${escapeTraditionalHtml(pinDisplayName)}</span>${buttonHtml}</li>`;
      }).join("");

      tableContainer.className = "compare-layout";
      tableContainer.innerHTML = `
        <section class="compare-left">
          <div class="site-toolbar">
            <label for="siteCompareSelect">PictureList_site 對應中文名稱</label>
            <select id="siteCompareSelect" class="site-select">${optionsHtml}</select>
          </div>
          <div class="site-image-wrap">
            <div class="site-file-id">FileID：${escapeHtml(selectedSiteFileId)}</div>
            <div class="site-image-body">${siteImageHtml}</div>
          </div>
        </section>
        <section class="compare-right">
          <p class="pin-list-title">Name_CN 原始值</p>
          <ul class="raw-name-list">${nameListHtml || '<li class="raw-name-item"><span class="raw-name-text">沒有 Name_CN 資料</span></li>'}</ul>
        </section>
        <aside id="pinDrawer" class="pin-drawer" aria-label="Pin 圖片預覽">
          <div class="pin-drawer-header">
            <p id="pinDrawerTitle" class="pin-drawer-title">Pin 圖片</p>
            <button id="pinDrawerClose" class="drawer-close" type="button" aria-label="關閉">×</button>
          </div>
          <div id="pinDrawerBody" class="pin-drawer-body"></div>
        </aside>
      `;
    }

    // 中文註解：渲染固定顯示的元件對應圖內容，左側為可搜尋元件列表與 Site 圖，右側為該元件 plugList。
    function renderComponentCompareTab() {
      if (!appState.rawData) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "尚未載入資料。");
        return;
      }

      const allComponentItems = getComponentCompareItems();
      if (allComponentItems.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "沒有可對應 PictureList_site 的元件資料，或尚未載入名稱 JSON。");
        return;
      }

      const componentItems = getVisibleComponentItems();

      if (componentItems.length === 0) {
        tableContainer.className = "compare-layout";
        tableContainer.innerHTML = `
          <section class="compare-left component-left">
            <div class="component-main">
              <div class="component-list-panel">
                ${renderComponentSearchControlsHtml()}

                <ul class="component-list"><li class="raw-name-item"><span class="raw-name-text">沒有符合的元件</span></li></ul>
              </div>
              <div class="component-image-panel"><div class="empty-state">請調整搜尋條件。</div></div>
            </div>
          </section>
          <section class="compare-right component-compare-right">
            <div class="component-right-section">
              <p class="pin-list-title">插頭圖清單</p>
              <ul class="raw-name-list"><li class="raw-name-item"><span class="raw-name-text">沒有插頭圖清單資料</span></li></ul>
            </div>
            <div class="component-right-section">
              <p class="pin-list-title">相關文件</p>
              <div class="index-tree"><div class="empty-state">請先選擇左側元件。</div></div>
            </div>
          </section>
        `;
        return;
      }

      const originalIndexByDisplayName = new Map(allComponentItems.map((componentItem, index) => [componentItem.displayName, index]));
      const selectedKey = allComponentItems[appState.selectedComponentIndex] ? allComponentItems[appState.selectedComponentIndex].displayName : "";
      let selectedFilteredIndex = componentItems.findIndex((componentItem) => componentItem.displayName === selectedKey);
      if (selectedFilteredIndex < 0) {
        selectedFilteredIndex = 0;
        appState.selectedComponentIndex = allComponentItems.findIndex((componentItem) => componentItem.displayName === componentItems[0].displayName);
      }

      const selectedComponent = componentItems[selectedFilteredIndex];
      const sitePath = getPictureRelativePath("PictureList_site", selectedComponent.siteItem);
      const siteFile = appState.imageFileMap.get(sitePath);
      const selectedSiteFileId = String(selectedComponent.siteItem && selectedComponent.siteItem.FileID ? selectedComponent.siteItem.FileID : "未提供").trim() || "未提供";
      // 中文註解：第五分頁中間位置圖標題需與左側選單名稱一致，並固定補上「位置圖」方便辨識目前圖片用途。
      const selectedSiteTitle = `${selectedComponent.displayName} 位置圖`;
      const siteImageHtml = siteFile
        ? `<img src="${URL.createObjectURL(siteFile)}" alt="${escapeHtml(sitePath)}">`
        : `<div class="empty-state">找不到 Site 圖片：${escapeHtml(sitePath)}</div>`;
      const componentListHtml = componentItems.map((componentItem) => {
        const originalIndex = originalIndexByDisplayName.get(componentItem.displayName);
        const activeClass = componentItem.displayName === selectedComponent.displayName ? " active" : "";
        return `<li><button class="component-list-item${activeClass}" type="button" data-component-index="${originalIndex}">${escapeTraditionalHtml(componentItem.displayName)}</button></li>`;
      }).join("");
      const matchedPlugList = selectedComponent.plugList.filter(hasMatchingSiteNameForPlug);
      const plugListHtml = matchedPlugList.map((plugName) => {
        const pinItem = findPinItemByName(plugName);
        const pinPath = pinItem ? getPinPictureRelativePath(pinItem) : "";
        const hasPinImage = pinPath ? appState.imageFileMap.has(pinPath) : false;
        const disabledAttribute = hasPinImage ? "" : " disabled";
        const pinDisplayName = `${selectedComponent.displayName}（${plugName}）`;
        const buttonHtml = pinItem
          ? `<button class="pin-button" type="button" data-pin-file-id="${escapeHtml(pinItem.FileID)}" data-pin-display-name="${escapeHtml(pinDisplayName)}" title="查看 Pin 圖"${disabledAttribute}>圖</button>`
          : "";
        return `<li class="raw-name-item"><span class="raw-name-text">${escapeTraditionalHtml(pinDisplayName)}</span>${buttonHtml}</li>`;
      }).join("");

      tableContainer.className = "compare-layout";
      tableContainer.innerHTML = `
        <section class="compare-left component-left">
          <div class="component-main">
            <div class="component-list-panel">
              ${renderComponentSearchControlsHtml()}

              <ul class="component-list">${componentListHtml}</ul>
            </div>
            <div class="component-image-panel">
              <div class="site-image-wrap">
                <div class="component-site-title">${escapeTraditionalHtml(selectedSiteTitle)}</div>
                <div class="site-image-body">${siteImageHtml}</div>
                <div class="site-file-id">FileID：${escapeHtml(selectedSiteFileId)}</div>
              </div>
            </div>
          </div>
        </section>
        <section class="compare-right component-compare-right">
          <div class="component-right-section">
            <p class="pin-list-title">${escapeTraditionalHtml(selectedComponent.displayName)} 插頭圖清單</p>
            <ul class="raw-name-list">${plugListHtml || '<li class="raw-name-item"><span class="raw-name-text">沒有插頭圖清單資料</span></li>'}</ul>
          </div>
          <div class="component-right-section">
            <p class="pin-list-title">${escapeTraditionalHtml(selectedComponent.name)} 相關文件</p>
            <div class="index-tree">${renderIndexTreeHtml(selectedComponent.name)}</div>
          </div>
        </section>
        <aside id="pinDrawer" class="pin-drawer" aria-label="Pin 圖片預覽">
          <div class="pin-drawer-header">
            <p id="pinDrawerTitle" class="pin-drawer-title">Pin 圖片</p>
            <button id="pinDrawerClose" class="drawer-close" type="button" aria-label="關閉">×</button>
          </div>
          <div id="pinDrawerBody" class="pin-drawer-body"></div>
        </aside>
      `;

      const componentList = tableContainer.querySelector(".component-list");
      if (componentList) componentList.scrollTop = appState.componentListScrollTop;
    }
    // 中文註解：目前畫面已固定為最後一個「元件對應圖」內容；保留統一入口，讓載入 JSON、名稱 JSON、索引 JSON 後都能刷新同一個畫面。
    function renderActiveView() {
      const contentPanel = document.getElementById("content");
      if (contentPanel) contentPanel.classList.add("compare-content");
      renderComponentCompareTab();
    }

    // 中文註解：更新檔案載入摘要，讓使用者知道各清單過濾與去重後剩下多少筆資料。
    function renderSummary(fileName) {
      const projectCount = appState.filteredData.ProjectList.length;
      const siteCount = appState.filteredData.PictureList_site.length;
      const pinCount = appState.filteredData.PictureList_pin.length;
      const imageCount = appState.imageFileMap.size;
      const jsonCount = appState.jsonFiles.length;
      const compeName = appState.currentCompeFile ? getFolderRelativePath(appState.currentCompeFile) : "未載入名稱 JSON";
      const indexName = appState.currentIndexJsonFile ? getFolderRelativePath(appState.currentIndexJsonFile) : "未載入索引 JSON";
      summaryElement.textContent = `已載入 ${fileName}：ProjectList ${projectCount} 筆，PictureList_site ${siteCount} 筆，PictureList_pin ${pinCount} 筆，圖片索引 ${imageCount} 個，JSON ${jsonCount} 個，名稱對應：${compeName}，索引：${indexName}。`;
      summaryElement.classList.remove("error");
    }


    // 中文註解：釋放前一次預覽圖片建立的暫存網址，避免長時間使用後佔用記憶體。
    function revokeCurrentImageUrl() {
      if (appState.currentImageUrl) {
        URL.revokeObjectURL(appState.currentImageUrl);
        appState.currentImageUrl = "";
      }
    }



    // 中文註解：釋放右側滑出 pin 圖片網址；輸入／輸出走 appState，會一次清掉原始圖與轉換後圖的暫存網址。
    function revokeCurrentPinDrawerUrl() {
      appState.currentPinDrawerUrls.forEach((imageUrl) => URL.revokeObjectURL(imageUrl));
      appState.currentPinDrawerUrls = [];
    }

    // 中文註解：開啟圖片 dialog；輸入為目前列資料，輸出為使用者可檢視的圖片預覽。
    function openImageDialog(rowItem) {
      const picturePath = getPictureRelativePath(appState.activeTab, rowItem);
      const imageFile = appState.imageFileMap.get(picturePath);

      revokeCurrentImageUrl();
      dialogTitle.textContent = `圖片預覽：${picturePath || "無檔案路徑"}`;

      if (!imageFile) {
        dialogBody.innerHTML = `<div class="empty-state">找不到對應圖片：${escapeHtml(picturePath || "FileID 空白")}</div>`;
        imageDialog.showModal();
        return;
      }

      appState.currentImageUrl = URL.createObjectURL(imageFile);
      dialogBody.innerHTML = `<img src="${appState.currentImageUrl}" alt="${escapeHtml(picturePath)}">`;
      imageDialog.showModal();
    }



    // 中文註解：建立 Pin 抽屜中的單張圖片區塊；輸入為標題、路徑與 File，輸出為原始檔或轉換後圖片 HTML。
    function renderPinDrawerImageSection(headingText, picturePath, imageFile) {
      if (!imageFile) {
        return `
          <section class="pin-image-section">
            <p class="pin-image-heading">${escapeHtml(headingText)}</p>
            <div class="pin-image-content"><div class="empty-state">找不到 Pin 圖片：${escapeHtml(picturePath || "FileID 空白")}</div></div>
          </section>
        `;
      }

      const imageUrl = URL.createObjectURL(imageFile);
      appState.currentPinDrawerUrls.push(imageUrl);
      return `
        <section class="pin-image-section">
          <p class="pin-image-heading">${escapeHtml(headingText)}</p>
          <div class="pin-image-content"><img src="${imageUrl}" alt="${escapeHtml(picturePath)}"></div>
        </section>
      `;
    }

    // 中文註解：開啟元件對應圖的右側滑出 pin 圖片面板；輸入為 pin 資料列與清單顯示名稱，輸出為上下排列的原始檔與轉換後 Pin 圖。
    function openPinDrawer(pinItem, pinDisplayName) {
      const pinDrawer = document.getElementById("pinDrawer");
      const pinDrawerTitle = document.getElementById("pinDrawerTitle");
      const pinDrawerBody = document.getElementById("pinDrawerBody");
      if (!pinDrawer || !pinDrawerTitle || !pinDrawerBody) return;

      const pinPath = getPinPictureRelativePath(pinItem);
      const convertedPinPath = getConvertedPinPictureRelativePath(pinItem);
      const pinFile = appState.imageFileMap.get(pinPath);
      const convertedPinFile = appState.imageFileMap.get(convertedPinPath.toLowerCase());
      revokeCurrentPinDrawerUrl();
      pinDrawerTitle.innerHTML = `<span class="pin-drawer-title-name">${escapeTraditionalHtml(pinDisplayName || "Pin 圖片")}</span><span class="pin-drawer-title-path">${escapeHtml(pinPath || "無檔案路徑")}</span>`;
      pinDrawerBody.innerHTML = [
        renderPinDrawerImageSection("原始檔", pinPath, pinFile),
        renderPinDrawerImageSection("轉換後", convertedPinPath, convertedPinFile),
      ].join("");
      pinDrawer.classList.add("open");
    }

    // 中文註解：關閉元件對應圖的右側滑出面板並釋放圖片網址，避免切換資料時殘留舊圖片。
    function closePinDrawer() {
      const pinDrawer = document.getElementById("pinDrawer");
      if (pinDrawer) pinDrawer.classList.remove("open");
      revokeCurrentPinDrawerUrl();
    }

    // 中文註解：處理表格內圖片按鈕點擊，透過列索引找到目前 tab 的原始資料。
    function handleTableClick(event) {
      const imageButton = event.target.closest(".image-button");
      if (imageButton && !imageButton.disabled) {
        const rowIndex = Number(imageButton.dataset.rowIndex);
        const currentRows = appState.filteredData[appState.activeTab] || [];
        const rowItem = currentRows[rowIndex];
        if (rowItem) openImageDialog(rowItem);
        return;
      }

      const filterToggle = event.target.closest("#componentFilterToggle");
      if (filterToggle) {
        const componentList = tableContainer.querySelector(".component-list");
        appState.componentListScrollTop = componentList ? componentList.scrollTop : 0;
        appState.componentRequirePlugImageAndDocument = !appState.componentRequirePlugImageAndDocument;
        closePinDrawer();
        renderComponentCompareTab();
        return;
      }

      const componentButton = event.target.closest(".component-list-item");
      if (componentButton) {
        const componentList = tableContainer.querySelector(".component-list");
        appState.componentListScrollTop = componentList ? componentList.scrollTop : 0;
        appState.selectedComponentIndex = Number(componentButton.dataset.componentIndex);
        closePinDrawer();
        renderComponentCompareTab();
        return;
      }

      const pinButton = event.target.closest(".pin-button");
      if (pinButton && !pinButton.disabled) {
        const pinItem = appState.filteredData.PictureList_pin.find((item) => String(item.FileID) === String(pinButton.dataset.pinFileId));
        if (pinItem) openPinDrawer(pinItem, pinButton.dataset.pinDisplayName || "");
        return;
      }

      const indexDocumentButton = event.target.closest(".index-leaf-button");
      if (indexDocumentButton) {
        openIndexDocumentWindow({
          documentType: indexDocumentButton.dataset.documentType || "",
          parentName: indexDocumentButton.dataset.parentName || "",
          nameCn: indexDocumentButton.dataset.nameCn || "",
          xmlNb: indexDocumentButton.dataset.xmlNb || "",
          factFileName: indexDocumentButton.dataset.factFileName || "",
        });
        return;
      }

      if (event.target.closest("#pinDrawerClose")) {
        closePinDrawer();
      }
    }

    // 中文註解：處理第 5 分頁左側關鍵字搜尋；debounce 後重繪，並在下一幀安全還原焦點與游標。
    function handleTableInput(event) {
      if (event.target.id === "componentSearchInput") {
        const cursorStart = event.target.selectionStart;
        const cursorEnd = event.target.selectionEnd;
        appState.componentSearchKeyword = event.target.value;
        appState.componentListScrollTop = 0;
        closePinDrawer();

        if (appState.componentSearchTimer) {
          clearTimeout(appState.componentSearchTimer);
        }

        appState.componentSearchTimer = setTimeout(() => {
          appState.componentSearchTimer = null;
          renderComponentCompareTab();
          requestAnimationFrame(() => {
            const searchInput = document.getElementById("componentSearchInput");
            if (!searchInput) return;
            searchInput.focus();
            if (typeof cursorStart === "number" && typeof cursorEnd === "number") {
              searchInput.setSelectionRange(cursorStart, cursorEnd);
            }
          });
        }, 120);
      }
    }
    // 中文註解：處理第四個 tab 的 Site 選單切換，更新左側圖片與右側 Name_CN 清單。
    function handleTableChange(event) {
      if (event.target.id === "siteCompareSelect") {
        appState.selectedSiteIndex = Number(event.target.value);
        closePinDrawer();
        renderCompareTab();
      }
    }

    // 中文註解：更新 JSON 下拉選單；多個 JSON 時讓使用者可切換，單一 JSON 時仍保留目前自動載入流程。
    function renderJsonSelect() {
      jsonSelect.innerHTML = appState.jsonFiles.map((file, index) => {
        const relativePath = getFolderRelativePath(file);
        const label = isLikelyMainJson(file) ? relativePath : `${relativePath}（輔助）`;
        return `<option value="${index}">${escapeTraditionalHtml(label)}</option>`;
      }).join("");

      jsonPicker.classList.toggle("hidden", appState.jsonFiles.length <= 1);
    }



    // 中文註解：更新名稱 JSON 下拉選單；多個 _compe_plugs.json 時讓使用者可切換來源。
    function renderCompeSelect() {
      compeSelect.innerHTML = appState.compeFiles.map((file, index) => `<option value="${index}">${escapeTraditionalHtml(getFolderRelativePath(file))}</option>`).join("");
      compePicker.classList.toggle("hidden", appState.compeFiles.length <= 1);
    }

    // 中文註解：更新索引 JSON 下拉選單；索引資料供第 5 分頁右下角 explorer-style 樹狀清單使用。
    function renderIndexJsonSelect() {
      indexJsonSelect.innerHTML = appState.indexJsonFiles.map((file, index) => {
        const relativePath = getFolderRelativePath(file);
        const label = isExplorerIndexJsonFile(file) ? relativePath : `${relativePath}（請確認為 explorer 索引格式）`;
        return `<option value="${index}">${escapeTraditionalHtml(label)}</option>`;
      }).join("");
      indexJsonPicker.classList.toggle("hidden", appState.indexJsonFiles.length === 0);
    }

    // 中文註解：讀取 explorer.html 格式索引 JSON；輸入是 File，輸出會更新右下角樹狀清單資料來源。
    function loadIndexJsonFile(indexJsonFile) {
      if (!indexJsonFile) {
        appState.indexData = null;
        appState.currentIndexJsonFile = null;
        invalidateComponentFilterCache();
        renderActiveView();
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          appState.indexData = JSON.parse(reader.result);
          appState.currentIndexJsonFile = indexJsonFile;
        } catch (error) {
          appState.indexData = null;
          appState.currentIndexJsonFile = null;
          summaryElement.textContent = `無法解析索引 JSON ${getFolderRelativePath(indexJsonFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
        if (appState.currentJsonFile) renderSummary(getFolderRelativePath(appState.currentJsonFile));
        invalidateComponentFilterCache();
        renderActiveView();
      };
      reader.readAsText(indexJsonFile, "utf-8");
    }

    // 中文註解：讀取 XML 文件圖片對應 JSON；輸入是 File，輸出會更新 GRAPHIC SRC 到 Picture/XmlUse 檔名的對應表。
    function loadXmlDocumentUseFile(xmlDocumentUseFile) {
      if (!xmlDocumentUseFile) {
        appState.xmlDocumentUseData = {};
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          appState.xmlDocumentUseData = JSON.parse(reader.result);
        } catch (error) {
          appState.xmlDocumentUseData = {};
          summaryElement.textContent = `無法解析 XML 圖片對應 JSON ${getFolderRelativePath(xmlDocumentUseFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
      };
      reader.readAsText(xmlDocumentUseFile, "utf-8");
    }

    // 中文註解：讀取名稱對應 JSON；失敗時保留空物件，第四 tab 會退回顯示原始 key。
    function loadCompeFile(compeFile) {
      if (!compeFile) {
        appState.compeData = {};
        appState.currentCompeFile = null;
        invalidateComponentFilterCache();
        renderActiveView();
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          appState.compeData = JSON.parse(reader.result);
          appState.currentCompeFile = compeFile;
        } catch (error) {
          appState.compeData = {};
          appState.currentCompeFile = null;
          summaryElement.textContent = `無法解析名稱 JSON ${getFolderRelativePath(compeFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
        if (appState.currentJsonFile) renderSummary(getFolderRelativePath(appState.currentJsonFile));
        invalidateComponentFilterCache();
        renderActiveView();
      };
      reader.readAsText(compeFile, "utf-8");
    }

    // 中文註解：讀取指定 JSON 檔，解析成功後更新畫面資料；輸入是 File 物件，輸出是目前表格畫面。
    function loadJsonFile(jsonFile) {
      if (!jsonFile) {
        return;
      }

      const reader = new FileReader();

      reader.onload = () => {
        try {
          const parsedData = JSON.parse(reader.result);
          appState.rawData = parsedData;
          appState.currentJsonFile = jsonFile;
          appState.selectedSiteIndex = 0;
          appState.selectedComponentIndex = 0;
          appState.componentSearchKeyword = "";
          appState.componentListScrollTop = 0;
          closePinDrawer();
          appState.filteredData = buildFilteredData(parsedData);
          invalidateComponentFilterCache();
          renderSummary(getFolderRelativePath(jsonFile));
          renderActiveView();
        } catch (error) {
          appState.rawData = null;
          appState.currentJsonFile = null;
          tableContainer.className = "empty-state";
          setTraditionalText(tableContainer, "JSON 格式錯誤，請確認檔案內容。");
          summaryElement.textContent = `無法解析 ${getFolderRelativePath(jsonFile)}：${error.message}`;
          summaryElement.classList.add("error");
        }
      };

      reader.readAsText(jsonFile, "utf-8");
    }

    // 中文註解：處理資料夾選取；建立圖片索引與 JSON 清單，並自動載入排序後第一個 JSON。
    function handleFolderChange(event) {
      const selectedFiles = Array.from(event.target.files || []);
      appState.folderFiles = selectedFiles;
      appState.jsonFiles = findJsonFiles(selectedFiles);
      appState.compeFiles = findCompeJsonFiles(selectedFiles);
      appState.indexJsonFiles = findIndexJsonFiles(selectedFiles);
      appState.xmlDocumentUseFiles = findXmlDocumentUseJsonFiles(selectedFiles);
      appState.imageFileMap = buildImageFileMap(selectedFiles);
      appState.xmlUseImageFileMap = buildXmlUseImageFileMap(selectedFiles);
      appState.rawData = null;
      appState.compeData = {};
      appState.indexData = null;
      appState.xmlDocumentUseData = {};
      appState.currentJsonFile = null;
      appState.currentCompeFile = null;
      appState.currentIndexJsonFile = null;
      appState.selectedSiteIndex = 0;
      appState.selectedComponentIndex = 0;
      appState.componentSearchKeyword = "";
      appState.componentListScrollTop = 0;
      appState.filteredData = buildFilteredData({});
      invalidateComponentFilterCache();
      closePinDrawer();
      renderJsonSelect();
      renderCompeSelect();
      renderIndexJsonSelect();
      revokeDocumentImageUrls();

      if (appState.xmlDocumentUseFiles.length > 0) {
        loadXmlDocumentUseFile(appState.xmlDocumentUseFiles[0]);
      }

      if (appState.indexJsonFiles.length > 0) {
        indexJsonSelect.value = "0";
        loadIndexJsonFile(appState.indexJsonFiles[0]);
      }

      if (appState.compeFiles.length > 0) {
        compeSelect.value = "0";
        loadCompeFile(appState.compeFiles[0]);
      }

      if (appState.jsonFiles.length === 0) {
        tableContainer.className = "empty-state";
        setTraditionalText(tableContainer, "找不到 JSON 檔案，請選擇 parse_ssp_xml_gui.py 輸出的資料夾。");
        setTraditionalText(summaryElement, "資料夾內沒有可用的 JSON 檔案。");
        summaryElement.classList.add("error");
        return;
      }

      jsonSelect.value = "0";
      loadJsonFile(appState.jsonFiles[0]);
    }

    // 中文註解：處理下拉選單切換 JSON；圖片根目錄仍沿用同一個已選資料夾。
    function handleJsonSelectChange(event) {
      const selectedIndex = Number(event.target.value);
      const selectedJsonFile = appState.jsonFiles[selectedIndex];
      loadJsonFile(selectedJsonFile);
    }



    // 中文註解：處理名稱 JSON 下拉切換；重新解析名稱後刷新第四 tab 標籤。
    function handleCompeSelectChange(event) {
      const selectedIndex = Number(event.target.value);
      loadCompeFile(appState.compeFiles[selectedIndex]);
    }

    // 中文註解：處理索引 JSON 下拉切換；重新解析後刷新第 5 分頁右下角樹狀清單。
    function handleIndexJsonSelectChange(event) {
      const selectedIndex = Number(event.target.value);
      loadIndexJsonFile(appState.indexJsonFiles[selectedIndex]);
    }

    topToggleButton.addEventListener("click", toggleTopPanel);
    folderInput.addEventListener("change", handleFolderChange);
    jsonSelect.addEventListener("change", handleJsonSelectChange);
    compeSelect.addEventListener("change", handleCompeSelectChange);
    indexJsonSelect.addEventListener("change", handleIndexJsonSelectChange);
    tableContainer.addEventListener("click", handleTableClick);
    tableContainer.addEventListener("change", handleTableChange);
    tableContainer.addEventListener("input", handleTableInput);
    dialogCloseButton.addEventListener("click", () => imageDialog.close());
    imageDialog.addEventListener("close", revokeCurrentImageUrl);
    documentDialogCloseButton.addEventListener("click", () => documentDialog.close());
    documentDialog.addEventListener("close", () => {
      revokeDocumentImageUrls();
      documentDialogTitle.textContent = "文件預覽";
      documentDialogBody.innerHTML = "";
    });


  </script>
</body>

</html>
